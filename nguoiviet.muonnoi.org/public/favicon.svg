<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Người Việt Muôn Nơi">
  <title>Người Việt Muôn Nơi</title>
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B7EFF"/>
      <stop offset="100%" stop-color="#7FE0E5"/>
    </linearGradient>
  </defs>
  <!-- Dark backdrop ring -->
  <circle cx="16" cy="16" r="16" fill="#0a0f14"/>
  <!-- Brand disc -->
  <circle cx="16" cy="16" r="13" fill="url(#favGrad)"/>
  <!-- NV monogram (thick, readable at 16px) -->
  <text x="16" y="21.5" text-anchor="middle" font-family="Be Vietnam Pro, Inter, system-ui, sans-serif" font-weight="900" font-size="14" fill="#ffffff" letter-spacing="-0.5">NV</text>
</svg>
