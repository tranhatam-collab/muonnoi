<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Người Việt Muôn Nơi logo">
  <title>Người Việt Muôn Nơi</title>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B7EFF"/>
      <stop offset="100%" stop-color="#7FE0E5"/>
    </linearGradient>
    <filter id="logoShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#3B7EFF" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g filter="url(#logoShadow)">
    <circle cx="100" cy="100" r="92" fill="url(#logoGrad)"/>
  </g>
  <text x="100" y="128" text-anchor="middle" font-family="Be Vietnam Pro, Inter, system-ui, sans-serif" font-weight="900" font-size="80" fill="#ffffff" letter-spacing="-2">NV</text>
</svg>
