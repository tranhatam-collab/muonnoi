<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-88.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 088</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .defense-grid { display:grid; grid-template-columns:repeat(5,50px); grid-template-rows:repeat(5,50px); gap:4px; background:#475569; padding:4px; border-radius:0.375rem; }
  .defense-cell { background:#334155; display:flex; align-items:center; justify-content:center; font-size:1.25rem; cursor:pointer; user-select:none; border-radius:4px; }
  .defense-cell.tower { background:#3b82f6; }
  .defense-cell.enemy { background:#ef4444; }
  #status { margin-top:0.5rem; font-size:0.875rem; color:#94a3b8; }
</style>
</head>
<body data-game="game-088">

<div id="hud-root"></div>
<div id="game-root">
  <div class="defense-grid" id="defense-grid"></div>
  <div id="status">Đặt tháp để ngăn kẻ địch</div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 088</h1>
    <p>Đặt tháp phòng thủ để ngăn kẻ địch đến cuối đường!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-088';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Phòng Thủ',desc:'Kẻ địch di chuyển từ trên xuống. Đặt tháp để ngăn chúng.'},{title:'Đặt Tháp',desc:'Chạm ô trống để đặt tháp. Mỗi màn có giới hạn tháp.'},{title:'Thắng',desc:'Ngăn hết kẻ địch trong số lượt cho phép.'}],
    en:[{title:'Defense',desc:'Enemies move top to bottom. Place towers to stop them.'},{title:'Place Tower',desc:'Tap empty cells to place towers. Limited per round.'},{title:'Win',desc:'Stop all enemies within the allowed turns.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('defense-grid');
  const statusEl=document.getElementById('status');
  let board=[],score=0,level=1,isPlaying=false,enemies=[],towers=0,maxTowers=0,wave=0;

  function init(){
    board=new Array(25).fill(null);
    enemies=[];towers=0;maxTowers=3+level;wave=0;
    for(let i=0;i<2+level;i++)enemies.push(Math.floor(Math.random()*5));
    render();
  }
  function render(){
    gridEl.innerHTML='';
    for(let i=0;i<25;i++){
      const cell=document.createElement('div');
      cell.className='defense-cell'+(board[i]==='tower'?' tower':'');
      cell.textContent=board[i]==='tower'?'🗼':'';
      if(enemies.includes(i))cell.classList.add('enemy');
      cell.addEventListener('click',()=>onClick(i));
      gridEl.appendChild(cell);
    }
    statusEl.textContent=(LANG==='vi'?'Tháp còn: ':'Towers left: ')+(maxTowers-towers);
  }
  function onClick(i){
    if(!isPlaying||board[i]||enemies.includes(i)||towers>=maxTowers)return;
    board[i]='tower';towers++;
    const r=Math.floor(i/5),c=i%5;
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<5&&nc>=0&&nc<5){const ni=nr*5+nc;const ei=enemies.indexOf(ni);if(ei>=0)enemies.splice(ei,1);}});
    if(enemies.length===0){score+=level*30;hud.setScore(score);level++;hud.setLevel(level);setTimeout(init,400);}
    else if(towers>=maxTowers){endGame();}
    render();
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
