<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 057</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-057">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 057</h1>
    <p>Nhấn để nhảy qua các chướng ngại vật!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-057';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Nhảy Qua',desc:'Nhân vật tự chạy. Nhấn để nhảy qua các khối chướng ngại vật.'},{title:'Thời điểm',desc:'Nhảy quá sớm hoặc quá muộn đều va chạm.'},{title:'Tốc độ',desc:'Càng chạy xa, tốc độ càng nhanh.'}],
    en:[{title:'Jump Over',desc:'Character runs automatically. Tap to jump over obstacle blocks.'},{title:'Timing',desc:'Jump too early or too late and you crash.'},{title:'Speed',desc:'The further you run, the faster it gets.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:60,y:320,vy:0,r:12,ground:320};
  let obstacles=[],obsTimer=null,scrollSpeed=3;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#22c55e';ctx.fillRect(0,player.ground+12,canvas.width,canvas.height-player.ground-12);
    ctx.fillStyle='#eab308';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ef4444';
    obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));
    ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('Dist: '+score,10,20);
  }
  function update(){
    if(!isPlaying)return;
    player.y+=player.vy;player.vy+=0.6;
    if(player.y>player.ground){player.y=player.ground;player.vy=0;}
    obstacles.forEach(o=>{o.x-=scrollSpeed;});
    obstacles=obstacles.filter(o=>o.x+o.w>0);
    for(const o of obstacles){
      if(player.x+player.r>o.x&&player.x-player.r<o.x+o.w&&player.y+player.r>o.y){endGame();return;}
    }
    score+=Math.floor(scrollSpeed/2);
    if(score%500===0){level++;hud.setLevel(level);scrollSpeed+=0.5;}
    hud.setScore(score);
    draw();requestAnimationFrame(update);
  }
  function spawnObs(){
    if(!isPlaying)return;
    const h=30+Math.random()*30;
    obstacles.push({x:canvas.width,y:player.ground-h+12,w:20+Math.random()*20,h:h});
  }
  function startGame(){
    document.getElementById('start-overlay').style.display='none';
    score=0;level=1;isPlaying=true;player={x:60,y:320,vy:0,r:12,ground:320};obstacles=[];scrollSpeed=3;
    hud.setScore(0);hud.setLevel(1);
    update();obsTimer=setInterval(spawnObs,1500);
  }
  function endGame(){isPlaying=false;clearInterval(obsTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  canvas.addEventListener('pointerdown',()=>{if(isPlaying&&player.y>=player.ground-1)player.vy=-12;});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
