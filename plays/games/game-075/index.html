<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 075</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-075">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 075</h1>
    <p>Kéo thả để bắn vào mục tiêu. Càng gần tâm càng nhiều điểm!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-075';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Kéo Thả',desc:'Kéo ngược để ngắm, thả để bắn.'},{title:'Tâm bia',desc:'Càng gần tâm đỏ càng nhiều điểm.'},{title:'Gió',desc:'Gió ngẫu nhiên ảnh hưởng đường bay.'}],
    en:[{title:'Drag & Shoot',desc:'Drag back to aim, release to shoot.'},{title:'Bullseye',desc:'Closer to the red center = more points.'},{title:'Wind',desc:'Random wind affects the projectile path.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let ball=null,target={x:160,y:60,r:25},wind=0,dragStart=null;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(target.x,target.y,target.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff33';ctx.beginPath();ctx.arc(target.x,target.y,target.r*0.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(target.x,target.y,target.r*0.3,0,Math.PI*2);ctx.fill();
    if(ball){ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(ball.x,ball.y,6,0,Math.PI*2);ctx.fill();}
    if(dragStart){ctx.strokeStyle='#94a3b8';ctx.beginPath();ctx.moveTo(160,350);ctx.lineTo(dragStart.x,dragStart.y);ctx.stroke();}
    ctx.fillStyle='#eab308';ctx.fillRect(150,350,20,10);
  }
  function update(){
    if(!isPlaying||!ball)return;
    ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=0.15;
    const dx=ball.x-target.x,dy=ball.y-target.y;
    if(Math.sqrt(dx*dx+dy*dy)<target.r+6){
      const dist=Math.sqrt(dx*dx+dy*dy);
      score+=Math.max(10,100-Math.floor(dist*3));hud.setScore(score);level++;hud.setLevel(level);wind=(Math.random()-0.5)*2;ball=null;draw();return;
    }
    if(ball.y>canvas.height||ball.x<0||ball.x>canvas.width){endGame();return;}
    draw();requestAnimationFrame(update);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;ball=null;wind=0;hud.setScore(0);hud.setLevel(1);draw();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function getPos(e){const rect=canvas.getBoundingClientRect();return{x:(e.clientX-rect.left)*(canvas.width/rect.width),y:(e.clientY-rect.top)*(canvas.height/rect.height)};}
  canvas.addEventListener('pointerdown',e=>{if(!isPlaying)return;dragStart=getPos(e);});
  canvas.addEventListener('pointermove',e=>{if(!isPlaying||!dragStart)return;dragStart=getPos(e);draw();});
  canvas.addEventListener('pointerup',e=>{
    if(!isPlaying||!dragStart)return;
    const p=getPos(e);const dx=160-p.x,dy=350-p.y;
    ball={x:160,y:350,vx:dx*0.15+wind,vy:dy*0.15};dragStart=null;update();
  });
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
