<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-74.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 074</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .light-grid { display:grid; grid-template-columns:repeat(4,60px); grid-template-rows:repeat(4,60px); gap:4px; background:#475569; padding:4px; border-radius:0.375rem; }
  .light-cell { background:#334155; border-radius:4px; cursor:pointer; }
  .light-cell.on { background:#eab308; }
</style>
</head>
<body data-game="game-074">

<div id="hud-root"></div>
<div id="game-root">
  <div class="light-grid" id="light-grid"></div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 074</h1>
    <p>Bật/tắt đèn sao cho tất cả đều sáng. Mỗi ô đổi cả ô xung quanh!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-074';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Bật Đèn',desc:'Bấm 1 ô sẽ đổi trạng thái nó và 4 ô xung quanh.'},{title:'Mục tiêu',desc:'Làm cho tất cả ô đều sáng (màu vàng).'},{title:'Tính toán',desc:'Suy nghĩ trước khi bấm. Mỗi màn có giới hạn bước.'}],
    en:[{title:'Light Switch',desc:'Clicking a cell toggles it and its 4 neighbors.'},{title:'Goal',desc:'Make every cell light up (yellow).'},{title:'Plan',desc:'Think before you click. Each round has a move limit.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('light-grid');
  let grid=[],score=0,level=1,isPlaying=false,moves=0,moveLimit=0;

  function init(){
    grid=new Array(16).fill(false);
    for(let i=0;i<5+level;i++)toggle(Math.floor(Math.random()*16));
    moves=0;moveLimit=12+level;render();
  }
  function toggle(i){
    const r=Math.floor(i/4),c=i%4;
    [[0,0],[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<4&&nc>=0&&nc<4){const ni=nr*4+nc;grid[ni]=!grid[ni];}
    });
  }
  function render(){
    gridEl.innerHTML='';
    for(let i=0;i<16;i++){
      const cell=document.createElement('div');
      cell.className='light-cell'+(grid[i]?' on':'');
      cell.addEventListener('click',()=>{
        if(!isPlaying)return;
        toggle(i);moves++;render();
        if(grid.every(v=>v)){score+=Math.max(10,moveLimit-moves+1)*10;hud.setScore(score);level++;hud.setLevel(level);setTimeout(init,400);}
        else if(moves>=moveLimit){endGame();}
      });
      gridEl.appendChild(cell);
    }
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
