<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 096</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-096">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 096</h1>
    <p>Chạm mặt nước để tạo sóng. Thư giãn!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-096';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Sóng Nước',desc:'Chạm hoặc kéo trên mặt nước để tạo sóng lan tỏa.'},{title:'Thư giãn',desc:'Không có điểm hay thua cuộc. Chỉ để tĩnh tâm.'},{title:'Kéo',desc:'Kéo chuột để tạo nhiều sóng liên tục.'}],
    en:[{title:'Water Ripple',desc:'Tap or drag on the water surface to create spreading ripples.'},{title:'Relax',desc:'No score or game over. Just calm your mind.'},{title:'Drag',desc:'Drag mouse to create continuous ripples.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:false});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let ripples=[],isPlaying=false;

  function draw(){
    ctx.fillStyle='#0ea5e9';ctx.fillRect(0,0,canvas.width,canvas.height);
    ripples.forEach((r,i)=>{
      r.radius+=1.5;r.alpha-=0.015;
      if(r.alpha<=0)ripples.splice(i,1);
      else{ctx.strokeStyle='rgba(255,255,255,'+r.alpha+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(r.x,r.y,r.radius,0,Math.PI*2);ctx.stroke();}
    });
    if(isPlaying)requestAnimationFrame(draw);
  }
  function getPos(e){const rect=canvas.getBoundingClientRect();return{x:(e.clientX-rect.left)*(canvas.width/rect.width),y:(e.clientY-rect.top)*(canvas.height/rect.height)};}
  canvas.addEventListener('pointerdown',e=>{if(!isPlaying)return;const p=getPos(e);ripples.push({x:p.x,y:p.y,radius:0,alpha:1});});
  canvas.addEventListener('pointermove',e=>{if(!isPlaying)return;const p=getPos(e);if(Math.random()>0.7)ripples.push({x:p.x,y:p.y,radius:0,alpha:0.8});});
  document.getElementById('btn-start').addEventListener('click',()=>{document.getElementById('start-overlay').style.display='none';isPlaying=true;hud.setScore(0);draw();});
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
