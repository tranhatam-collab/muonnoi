<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-92.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 092</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-092">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 092</h1>
    <p>Giữ chân trên sàn an toàn. Sàn đỏ là nóng!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-092';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Sàn An Toàn',desc:'Di chuyển để đứng trên sàn xanh. Tránh sàn đỏ.'},{title:'Sàn đỏ',desc:'Sàn đỏ xuất hiện ngẫu nhiên. Đứng lên là thua.'},{title:'Khó dần',desc:'Sàn đỏ xuất hiện nhiều hơn và nhanh hơn.'}],
    en:[{title:'Safe Floor',desc:'Move to stand on green floors. Avoid red floors.'},{title:'Red Floor',desc:'Red floors appear randomly. Stand on them = game over.'},{title:'Harder',desc:'More and faster red floors over time.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:160,y:360,r:10};
  let floors=[],floorTimer=null,speed=2;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    floors.forEach(f=>{ctx.fillStyle=f.safe?'#22c55e':'#ef4444';ctx.fillRect(f.x,f.y,f.w,20);});
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
  }
  function update(){
    if(!isPlaying)return;
    floors.forEach(f=>f.y+=speed);floors=floors.filter(f=>f.y<canvas.height+20);
    let onSafe=false;
    for(const f of floors){if(player.x>f.x&&player.x<f.x+f.w&&player.y+player.r>f.y&&player.y+player.r<f.y+25){if(!f.safe){endGame();return;}onSafe=true;}}
    if(!onSafe&&player.y<canvas.height-20){endGame();return;}
    score++;if(score%400===0){level++;hud.setLevel(level);speed+=0.5;}
    hud.setScore(score);draw();requestAnimationFrame(update);
  }
  function spawn(){if(!isPlaying)return;const w=80+Math.random()*100;floors.push({x:Math.random()*(canvas.width-w),y:-20,w:w,safe:Math.random()>0.3});}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;player={x:160,y:360,r:10};floors=[{x:60,y:380,w:200,safe:true}];speed=2;hud.setScore(0);hud.setLevel(1);update();floorTimer=setInterval(spawn,1200);}
  function endGame(){isPlaying=false;clearInterval(floorTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function movePlayer(cx){const rect=canvas.getBoundingClientRect();player.x=(cx-rect.left)*(canvas.width/rect.width);player.x=Math.max(player.r,Math.min(canvas.width-player.r,player.x));}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)movePlayer(e.clientX);});
  canvas.addEventListener('pointerdown',e=>{if(isPlaying)movePlayer(e.clientX);});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
