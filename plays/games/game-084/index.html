<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-84.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 084</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #breath-circle { width:200px; height:200px; border-radius:50%; background:#22c55e; display:flex; align-items:center; justify-content:center; font-size:1.25rem; transition:transform 0.1s linear; }
  #breath-text { margin-top:1rem; font-size:1rem; color:#94a3b8; }
</style>
</head>
<body data-game="game-084">

<div id="hud-root"></div>
<div id="game-root">
  <div id="breath-circle">Hít</div>
  <div id="breath-text">Hít vào khi vòng tròn phóng to</div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 084</h1>
    <p>Theo nhịp hít thở để thư giãn. Không điểm, không thua!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-084';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Hít Thở',desc:'Vòng tròn phóng to = hít vào. Thu nhỏ = thở ra.'},{title:'Thư giãn',desc:'Không có điểm hay thua cuộc. Chỉ để tĩnh tâm.'},{title:'Nhịp độ',desc:'Nhịp 4 giây hít, 4 giây thở.'}],
    en:[{title:'Breathe',desc:'Circle expands = inhale. Shrinks = exhale.'},{title:'Relax',desc:'No score or game over. Just calm your mind.'},{title:'Rhythm',desc:'4 seconds in, 4 seconds out.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:false});
  const circle=document.getElementById('breath-circle');
  const text=document.getElementById('breath-text');
  let isPlaying=false,phase='in',time=0;

  function update(){
    if(!isPlaying)return;
    time+=0.016;
    if(phase==='in'){
      const s=1+Math.min(1,time/4);
      circle.style.transform='scale('+s+')';
      circle.textContent=LANG==='vi'?'Hít':'Inhale';
      if(time>=4){phase='out';time=0;}
    }else{
      const s=2-Math.min(1,time/4);
      circle.style.transform='scale('+s+')';
      circle.textContent=LANG==='vi'?'Thở':'Exhale';
      if(time>=4){phase='in';time=0;}
    }
    requestAnimationFrame(update);
  }
  document.getElementById('btn-start').addEventListener('click',()=>{document.getElementById('start-overlay').style.display='none';isPlaying=true;time=0;phase='in';hud.setScore(0);update();});
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
