<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 071</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-071">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 071</h1>
    <p>Bắn các kẻ địch từ trên xuống. Di chuyển và nhấn để bắn!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-071';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Bắn Kẻ Địch',desc:'Kẻ địch di chuyển từ trên xuống. Di chuyển súng và nhấn để bắn.'},{title:'Di chuyển',desc:'Dùng chuột hoặc chạm để di chuyển súng ngang.'},{title:'Thắng',desc:'Tiêu diệt càng nhiều càng tốt. Để chạm đất 3 lần là thua.'}],
    en:[{title:'Shoot Enemies',desc:'Enemies move down. Move the cannon and tap to shoot.'},{title:'Move',desc:'Use mouse or touch to move the cannon horizontally.'},{title:'Win',desc:'Destroy as many as possible. 3 enemies hit ground = game over.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:160,y:370,w:30};
  let bullets=[],enemies=[],lives=3,spawnTimer=null;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#3b82f6';ctx.fillRect(player.x-player.w/2,player.y,player.w,10);
    ctx.fillStyle='#fff';
    bullets.forEach(b=>{ctx.fillRect(b.x-2,b.y,4,8);});
    ctx.fillStyle='#ef4444';
    enemies.forEach(e=>{ctx.fillRect(e.x,e.y,e.w,e.h);});
    ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('Lives: '+lives,10,20);
  }
  function update(){
    if(!isPlaying)return;
    bullets.forEach(b=>b.y-=6);bullets=bullets.filter(b=>b.y>0);
    enemies.forEach(e=>e.y+=e.vy);
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(e.y>canvas.height){enemies.splice(i,1);lives--;if(lives<=0){endGame();return;}}
      for(let j=bullets.length-1;j>=0;j--){
        const b=bullets[j];
        if(b.x>e.x&&b.x<e.x+e.w&&b.y<e.y+e.h&&b.y>e.y){enemies.splice(i,1);bullets.splice(j,1);score+=10+level*2;hud.setScore(score);if(score>=level*150){level++;hud.setLevel(level);}break;}
      }
    }
    draw();requestAnimationFrame(update);
  }
  function spawn(){if(!isPlaying)return;const w=20+Math.random()*20;enemies.push({x:Math.random()*(canvas.width-w),y:-20,w:w,h:w,vy:1+level*0.3});}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;player={x:160,y:370,w:30};bullets=[];enemies=[];lives=3;hud.setScore(0);hud.setLevel(1);update();spawnTimer=setInterval(spawn,1200);}
  function endGame(){isPlaying=false;clearInterval(spawnTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function movePlayer(cx){const rect=canvas.getBoundingClientRect();player.x=(cx-rect.left)*(canvas.width/rect.width);player.x=Math.max(player.w/2,Math.min(canvas.width-player.w/2,player.x));}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)movePlayer(e.clientX);});
  canvas.addEventListener('pointerdown',e=>{if(isPlaying){movePlayer(e.clientX);bullets.push({x:player.x,y:player.y});}});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
