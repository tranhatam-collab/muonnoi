<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Thợ Săn Quy Luật · Muôn Nơi Plays</title>
  <link rel="stylesheet" href="../../assets/plays.css">
  <style>
    .seq{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
    .tile{min-width:48px;height:48px;padding:0 10px;display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:700;border-radius:12px;background:var(--card);border:1px solid var(--line)}
    .tile.q{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#0b0c10;border:none}
    .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
    .opt{padding:16px 0;font-size:20px;font-weight:700}
    .opt.good{background:var(--ok)!important;color:#08110a!important;border:none!important}
    .opt.wrong{background:var(--bad)!important;color:#fff!important;border:none!important}
    .timebar{height:5px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:4px}
    .timebar > i{display:block;height:100%;background:var(--brand2);width:100%}
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="game-top">
      <a class="back" href="../../index.html">‹ Tất cả game</a>
      <div class="brand"><div class="mark"></div><b>Thợ Săn Quy Luật</b></div>
    </div>

    <div class="hud">
      <div class="stat"><div class="k">Mức</div><div class="v" id="hLevel">1</div></div>
      <div class="stat"><div class="k">Điểm</div><div class="v" id="hScore">0</div></div>
      <div class="stat"><div class="k">Chuỗi</div><div class="v" id="hCombo">0</div></div>
      <div class="stat"><div class="k">Mạng</div><div class="v" id="hLives">♥♥♥</div></div>
    </div>

    <div class="stage" id="stage" style="min-height:280px">
      <div style="padding:18px 16px">
        <div class="small" id="hint" style="text-align:center">Tìm quy luật của dãy, chọn phần tử còn thiếu (ô sáng).</div>
        <div class="timebar" id="tb"><i id="tbi"></i></div>
        <div class="seq" id="seq"></div>
        <div class="opts" id="opts"></div>
      </div>
      <div class="overlay" id="overlay">
        <h2 id="ovTitle">Thợ Săn Quy Luật</h2>
        <p class="small" id="ovText">
          Mỗi dãy ẩn một <b>quy luật</b>. Đoán phần tử còn thiếu. Quy luật <b>khó dần</b>,
          thời gian <b>ngắn dần</b> — và <b>không có đáp án cuối cùng</b>. Bạn đi được bao xa?
        </p>
        <div class="note" id="ovBest"></div>
        <button class="btn" id="startBtn">Bắt đầu</button>
        <div class="small" id="ovAuth"></div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="../../assets/plays-sdk.js"></script>
  <script>
  const GAME_ID='thuo-san-quy-luat';
  const FREE=4; // lượt chơi miễn phí trước khi cần đăng ký
  const $=id=>document.getElementById(id);
  function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1200);}
  function hearts(n){return '♥'.repeat(Math.max(0,n))+'♡'.repeat(Math.max(0,3-n));}
  const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  const pick=a=>a[ri(0,a.length-1)];

  let best={level:0,score:0};
  let G=null, timer=null;

  const EMOJI=['🌱','🔥','💧','🌟','🍀','🌙','⚡','🌸','🐚','🍂'];

  // sinh dãy theo 1 quy luật ngẫu nhiên, trả {seq, answer, label}
  function makePuzzle(level){
    const len = Math.min(4 + Math.floor(level/3), 8);
    const rules = ['arith','alt','inc'];
    if (level>=4) rules.push('geo');
    if (level>=6) rules.push('fib','emoji');
    if (level>=9) rules.push('repeat');
    const rule = pick(rules);
    let s=[];
    if (rule==='arith'){ let a=ri(1,12), k=ri(2,9)*(level>=5&&Math.random()<.4?-1:1); for(let i=0;i<len;i++) s.push(a+k*i); }
    else if (rule==='alt'){ let a=ri(1,20), b=ri(1,20); for(let i=0;i<len;i++) s.push(i%2?b:a); }
    else if (rule==='inc'){ let a=ri(1,9), d=ri(1,4); let v=a; for(let i=0;i<len;i++){ s.push(v); v+=d; d++; } }
    else if (rule==='geo'){ let a=ri(1,4), r=ri(2,3); let v=a; for(let i=0;i<len;i++){ s.push(v); v*=r; } }
    else if (rule==='fib'){ let a=ri(1,5), b=ri(1,6); for(let i=0;i<len;i++){ s.push(a); const t=a+b; a=b; b=t; } }
    else if (rule==='emoji'){ const k=ri(1,3); let i0=ri(0,9); for(let i=0;i<len;i++) s.push(EMOJI[(i0+k*i)%EMOJI.length]); }
    else { const block=[ri(1,9),ri(1,9),ri(1,9)].slice(0,ri(2,3)); for(let i=0;i<len;i++) s.push(block[i%block.length]); }
    const answer = s[s.length-1];
    return { seq:s, answer, rule, emoji: rule==='emoji' };
  }

  function buildOptions(p){
    const set=new Set([String(p.answer)]);
    const opts=[p.answer];
    let guard=0;
    while(opts.length<4 && guard++<50){
      let cand;
      if (p.emoji) cand = pick(EMOJI);
      else {
        const a=Number(p.answer);
        const delta = pick([1,-1,2,-2,3,-3,ri(1,9),-ri(1,9)]);
        cand = a + delta;
      }
      if (!set.has(String(cand))){ set.add(String(cand)); opts.push(cand); }
    }
    // xáo trộn
    for(let i=opts.length-1;i>0;i--){ const j=ri(0,i); [opts[i],opts[j]]=[opts[j],opts[i]]; }
    return opts;
  }

  function roundTime(level){ return Math.max(3.5, 9 - level*0.4); } // giây, ngắn dần

  function newGame(){ return { running:true, level:1, score:0, combo:0, lives:3, correct:0 }; }

  function startRound(){
    const p = makePuzzle(G.level);
    G.cur = p;
    // render dãy: hiện hết trừ phần tử cuối (ẩn = ?)
    const seqEl=$('seq'); seqEl.innerHTML='';
    p.seq.forEach((v,i)=>{
      const d=document.createElement('div');
      if (i===p.seq.length-1){ d.className='tile q'; d.textContent='?'; }
      else { d.className='tile'; d.textContent=v; }
      seqEl.appendChild(d);
    });
    // options
    const opts=buildOptions(p);
    const oe=$('opts'); oe.innerHTML='';
    opts.forEach(v=>{
      const b=document.createElement('button');
      b.className='btn secondary opt'; b.textContent=v;
      b.onclick=()=>choose(b,v,p);
      oe.appendChild(b);
    });
    // timer
    G.time=roundTime(G.level); G.timeMax=G.time;
    startTimer();
    hud();
  }

  function startTimer(){
    stopTimer();
    timer=setInterval(()=>{
      G.time-=0.05;
      $('tbi').style.width = Math.max(0,G.time/G.timeMax*100)+'%';
      if (G.time<=0){ stopTimer(); timeUp(); }
    },50);
  }
  function stopTimer(){ if(timer){ clearInterval(timer); timer=null; } }

  function choose(btn,val,p){
    if (!G||!G.running) return;
    stopTimer();
    const ok = String(val)===String(p.answer);
    document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
    if (ok){
      btn.classList.add('good');
      G.combo++; G.correct++;
      const tBonus=Math.ceil(G.time*2);
      G.score += 10 + G.level*3 + G.combo*2 + tBonus;
      if (G.correct%3===0){ G.level++; toast('Mức '+G.level+'! Quy luật khó hơn 🧠'); }
      // hé lộ đáp án ở ô ?
      const q=document.querySelector('.tile.q'); if(q){ q.textContent=p.answer; }
      hud();
      setTimeout(()=>{ if(G.running) startRound(); }, 460);
    } else {
      btn.classList.add('wrong');
      // tô đúng
      document.querySelectorAll('.opt').forEach(b=>{ if(String(b.textContent)===String(p.answer)) b.classList.add('good'); });
      loseLife(p);
    }
  }

  function timeUp(){
    if(!G||!G.running) return;
    document.querySelectorAll('.opt').forEach(b=>{ b.disabled=true; if(String(b.textContent)===String(G.cur.answer)) b.classList.add('good'); });
    toast('Hết giờ!');
    loseLife(G.cur);
  }

  function loseLife(p){
    G.combo=0; G.lives--; hud();
    const q=document.querySelector('.tile.q'); if(q){ q.textContent=p.answer; }
    if (G.lives<=0){ setTimeout(gameOver, 700); return; }
    setTimeout(()=>{ if(G.running) startRound(); }, 800);
  }

  function hud(){
    $('hLevel').textContent=G.level;
    $('hScore').textContent=G.score;
    $('hCombo').textContent=G.combo;
    $('hLives').textContent=hearts(G.lives);
  }

  async function start(){
    const gate = await MNPlays.beginPlay(GAME_ID, FREE);
    if (!gate.allowed) return;
    stopTimer(); G=newGame(); hud();
    $('overlay').classList.add('hidden');
    MNPlays.saveProgress(GAME_ID,{status:'playing',level:1,score:0});
    startRound();
  }

  async function gameOver(){
    G.running=false; stopTimer();
    const bl=Math.max(best.level,G.level), bs=Math.max(best.score,G.score);
    const isPB=G.score>best.score; best={level:bl,score:bs};
    await MNPlays.saveProgress(GAME_ID,{status:'played',level:bl,score:bs});
    const pts=Math.floor(G.score/8)+G.level*2;
    const res=await MNPlays.awardPoints(GAME_ID,pts,'pattern-hunter');
    $('ovTitle').textContent=isPB?'Kỷ lục mới! 🎉':'Hết mạng';
    $('ovText').innerHTML=`Bạn đạt <b>Mức ${G.level}</b> · <b>${G.score} điểm</b>.<br/>`
      +(res?`Nhận <b>+${pts} Muôn Điểm</b>${res.guest?' (tạm)':''}.`:'')
      +`<br/><span class="small">Quy luật là vô tận. Hẹn gặp ở mức sâu hơn.</span>`;
    $('ovBest').textContent=`Kỷ lục: Mức ${best.level} · ${best.score} điểm`;
    $('startBtn').textContent='Chơi lại'; $('overlay').classList.remove('hidden'); refreshAuthLine();
  }

  $('startBtn').onclick=start;
  function refreshAuthLine(){
    $('ovAuth').innerHTML=MNPlays.isLoggedIn()
      ?'✓ Tiến trình & điểm được lưu vào tài khoản.'
      :'<a href="'+MNPlays.loginUrl()+'" style="color:var(--brand2)">Đăng nhập</a> để lưu tiến trình & nhận Muôn Điểm.';
  }
  (async ()=>{
    await MNPlays.init();
    const p=await MNPlays.loadProgress(GAME_ID);
    if(p) best={level:p.level||0,score:p.score||0};
    if(best.score) $('ovBest').textContent=`Kỷ lục: Mức ${best.level} · ${best.score} điểm`;
    refreshAuthLine();
  })();
  </script>
</body>
</html>
