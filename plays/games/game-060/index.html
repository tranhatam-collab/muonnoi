<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 060</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-060">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 060</h1>
    <p>Chạm các điểm theo thứ tự 1, 2, 3... để nối chúng!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-060';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Nối Điểm',desc:'Các điểm số xuất hiện ngẫu nhiên. Chạm đúng thứ tự 1, 2, 3...'},{title:'Ghi nhớ',desc:'Quan sát vị trí các điểm và chạm nhanh theo thứ tự.'},{title:'Hoàn thành',desc:'Nối đúng hết để qua màn. Sai là thua!'}],
    en:[{title:'Connect Dots',desc:'Numbered dots appear randomly. Tap them in order 1, 2, 3...'},{title:'Memory',desc:'Observe dot positions and tap quickly in order.'},{title:'Complete',desc:'Connect all correctly to pass. Wrong = game over!'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false,dots=[],current=1,timeLeft=0,maxTime=0,timerId=null;

  function init(){
    dots=[];current=1;
    const count=3+level;
    for(let i=1;i<=count;i++){
      let x,y;let ok=false;let attempts=0;
      while(!ok&&attempts<100){x=30+Math.random()*(canvas.width-60);y=30+Math.random()*(canvas.height-60);ok=true;for(const d of dots){const dx=d.x-x,dy=d.y-y;if(Math.sqrt(dx*dx+dy*dy)<40){ok=false;break;}}attempts++;}
      dots.push({x,y,num:i});
    }
    maxTime=Math.max(5,12-level*0.5);timeLeft=maxTime;
    clearInterval(timerId);
    timerId=setInterval(()=>{if(!isPlaying)return;timeLeft-=0.1;if(timeLeft<=0)endGame();},100);
    draw();
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.fillText('Time: '+Math.ceil(timeLeft),10,20);
    dots.forEach(d=>{
      ctx.fillStyle=d.num===current?'#22c55e':'#334155';
      ctx.beginPath();ctx.arc(d.x,d.y,18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e2e8f0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(d.num,d.x,d.y);
    });
    if(current>1){
      ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.beginPath();
      for(let i=0;i<dots.length-1;i++){
        const a=dots.find(d=>d.num===i+1),b=dots.find(d=>d.num===i+2);
        if(a&&b&&current>i+2){ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);}
      }
      ctx.stroke();
    }
  }
  function updateLoop(){if(isPlaying){draw();requestAnimationFrame(updateLoop);}}
  function getPos(e){const rect=canvas.getBoundingClientRect();return{x:(e.clientX-rect.left)*(canvas.width/rect.width),y:(e.clientY-rect.top)*(canvas.height/rect.height)};}
  canvas.addEventListener('pointerdown',e=>{
    if(!isPlaying)return;
    const p=getPos(e);
    const target=dots.find(d=>d.num===current);
    if(!target)return;
    const dx=p.x-target.x,dy=p.y-target.y;
    if(Math.sqrt(dx*dx+dy*dy)<22){
      current++;
      if(current>dots.length){
        score+=Math.floor(timeLeft*10)+level*15;hud.setScore(score);level++;hud.setLevel(level);
        setTimeout(init,300);
      }
    }else{endGame();}
  });
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();updateLoop();}
  function endGame(){isPlaying=false;clearInterval(timerId);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
