<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="description" content="Giải mã từ tiếng Anh bị xáo trộn. Càng nhanh, điểm càng cao!"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Mật Mã Chữ · Muôn Nơi Plays</title>
  <link rel="stylesheet" href="../../assets/plays.css">
  <style>
    .cipher{font-family:monospace;font-size:28px;letter-spacing:8px;text-align:center;margin:20px 0;font-weight:700}
    .hint{text-align:center;color:var(--muted);font-size:13px;margin:8px 0}
    .keyboard{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0}
    .keyboard button{min-width:32px;padding:8px 10px;font-size:14px;border-radius:8px;background:var(--card);border:2px solid var(--line)}
    .keyboard button:hover{border-color:var(--brand)}
    .keyboard button.used{opacity:.4;cursor:not-allowed}
    .slots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:16px 0}
    .slots .slot{background:var(--card);border:2px solid var(--line);border-radius:8px;width:36px;height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
    .slots .slot.filled{border-color:var(--brand)}
    .slots .slot.correct{border-color:var(--ok);color:var(--ok)}
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="game-top">
      <a class="back" href="../../index.html">‹ Tất cả game</a>
      <div class="brand"><div class="mark"></div><b>Mật Mã Chữ</b></div>
    </div>
    <div class="hud">
      <div class="stat"><div class="k">Mức</div><div class="v" id="hLevel">1</div></div>
      <div class="stat"><div class="k">Điểm</div><div class="v" id="hScore">0</div></div>
      <div class="stat"><div class="k">Giải mã</div><div class="v" id="hSolved">0</div></div>
    </div>
    <div class="stage" id="stage">
      <div id="gameArea" style="display:none">
        <div class="hint" id="hint">—</div>
        <div class="cipher" id="cipher">—</div>
        <div class="slots" id="slots"></div>
        <div class="keyboard" id="keyboard"></div>
      </div>
      <div class="overlay" id="overlay">
        <h2>Mật Mã Chữ</h2>
        <p class="small">Giải mã từ tiếng Anh bị xáo trộn. Càng nhanh, điểm càng cao!</p>
        <button class="btn" id="startBtn">Bắt đầu</button>
        <div class="note" id="ovBest"></div>
      </div>
    </div>
  </div>
  <script src="../../assets/plays-sdk.js"></script>
  <script>
    const WORDS = ['Cat','Dog','House','Water','Fire','Wind','Sky','Sun','Moon','Star','Tree','Flower','Friend','Family','Love','Book','Pen','Table','Chair','Door','Window','School','Teacher','Student','Music','Dance','Color','Green','Blue','Red'];
    let level=1,score=0,solved=0,current='',shuffled='',placed=[],lives=3;
    const hLevel=document.getElementById('hLevel'),hScore=document.getElementById('hScore'),hSolved=document.getElementById('hSolved');
    const hintEl=document.getElementById('hint'),cipherEl=document.getElementById('cipher'),slotsEl=document.getElementById('slots'),keyboardEl=document.getElementById('keyboard');

    function shuffle(str){const a=str.split('');for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.join('');}
    function pick(){return WORDS[Math.floor(Math.random()*WORDS.length)];}
    function makeRound(){
      placed=[]; current=pick().toUpperCase();
      do{shuffled=shuffle(current);}while(shuffled===current);
      hintEl.textContent='Gợi ý: '+current.length+' chữ cái';
      cipherEl.textContent=shuffled;
      renderSlots();
      const uniq=[...new Set(current.split(''))];
      keyboardEl.innerHTML=shuffle(uniq.join('')).split('').map(c=>`<button data-c="${c}">${c}</button>`).join('');
      keyboardEl.querySelectorAll('button').forEach(b=>{b.onclick=()=>type(b);});
    }
    function renderSlots(){
      slotsEl.innerHTML=current.split('').map((_,i)=>`<div class="slot ${placed[i]?'filled':''} ${placed[i]&&placed[i]===current[i]?'correct':''}">${placed[i]||''}</div>`).join('');
    }
    function type(btn){
      const c=btn.dataset.c;
      const idx=placed.findIndex((p,i)=>!p&&current[i]===c);
      if(idx===-1) return;
      placed[idx]=c; btn.classList.add('used'); btn.disabled=true;
      renderSlots();
      checkComplete();
    }
    function checkComplete(){
      if(placed.filter(Boolean).length!==current.length) return;
      const correct=placed.every((p,i)=>p===current[i]);
      if(correct){
        solved++; score+=15+level*5; hSolved.textContent=solved; hScore.textContent=score;
        if(solved>=level*3){level++; hLevel.textContent=level;}
        MNPlays.saveProgress('mat-ma-chu',{level,score});
        setTimeout(makeRound,1000);
      }else{
        lives--;
        if(lives<=0){endGame();return;}
        placed=[]; keyboardEl.querySelectorAll('button').forEach(b=>{b.classList.remove('used'); b.disabled=false;});
        renderSlots();
      }
    }
    function endGame(){
      MNPlays.saveProgress('mat-ma-chu',{level,score});
      MNPlays.showGameOver('mat-ma-chu',score,{level},()=>{location.reload();});
    }
    document.getElementById('startBtn').onclick=()=>{
      document.getElementById('overlay').style.display='none';
      document.getElementById('gameArea').style.display='';
      lives=3; score=0; level=1; solved=0;
      makeRound();
    };
    (async()=>{
      const p=await MNPlays.loadProgress('mat-ma-chu');
      if(p){level=p.level||1;score=p.score||0;hLevel.textContent=level;hScore.textContent=score;}
      document.getElementById('ovBest').textContent = p?`Kỷ lục: Mức ${p.level||1} · ${p.score||0}đ`:'';
    })();
  </script>
</body>
</html>
