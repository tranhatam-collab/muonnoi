<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sắp Xếp Số</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; display:flex; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; }
  .game-canvas { width:100%; height:100%; }
</style>
</head>
<body data-game="sap-xep-so">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400" class="game-canvas"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Sắp Xếp Số</h1>
    <p>Sắp xếp các số theo thứ tự tăng dần càng nhanh càng tốt.</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Nhấn để bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function() {
  'use strict';
  const GAME_ID = 'sap-xep-so';
  const LANG = document.documentElement.lang === 'en' ? 'en' : 'vi';
  const TUTORIAL_STEPS = {
    vi: [
      { title: 'Sắp Xếp Số', desc: 'Sắp xếp các số theo thứ tự tăng dần càng nhanh càng tốt.' },
      { title: 'Mẹo', desc: 'Tập trung và phản xạ nhanh để đạt điểm cao nhất.' },
      { title: 'Vô hạn', desc: 'Không có giới hạn. Chơi càng lâu, độ khó càng tăng!' },
    ],
    en: [
      { title: 'Number Sort', desc: 'Sort numbers in ascending order as fast as you can.' },
      { title: 'Tip', desc: 'Stay focused and react fast for the highest score.' },
      { title: 'Endless', desc: 'No limits. The longer you play, the harder it gets!' },
    ],
  };
  const hud = PlaysSDK.createHud('hud-root', { showLevel: true });
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  let score = 0, level = 1, isPlaying = false, animId = null;

  function startGame() {
    document.getElementById('start-overlay').style.display = 'none';
    score = 0; level = 1; isPlaying = true;
    hud.setScore(0); hud.setLevel(1);
    gameLoop();
  }

  function gameLoop() {
    if (!isPlaying) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#334155';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Sắp Xếp Số - Đang phát triển', canvas.width/2, canvas.height/2);
    animId = requestAnimationFrame(gameLoop);
  }

  function endGame() {
    isPlaying = false;
    cancelAnimationFrame(animId);
    PlaysSDK.saveScore(GAME_ID, score, { level });
    PlaysSDK.showGameOver(GAME_ID, score, { level }, () => { location.reload(); });
  }

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-tutorial').addEventListener('click', () => {
    PlaysSDK.showTutorial(GAME_ID, TUTORIAL_STEPS[LANG]);
  });

  // Stub: this game is under development. Full gameplay will be implemented next.
  setTimeout(endGame, 5000); // Auto-end after 5s for placeholder
})();
</script>
</body>
</html>
