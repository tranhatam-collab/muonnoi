<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 051</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  .dot { position:absolute; width:40px; height:40px; background:#ef4444; border-radius:50%; cursor:pointer; }
</style>
</head>
<body data-game="game-051">

<div id="hud-root"></div>
<div id="game-root"></div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 051</h1>
    <p>Chạm chấm đỏ xuất hiện ngẫu nhiên càng nhanh càng tốt!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-051';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Chạm Nhanh',desc:'Chấm đỏ sẽ xuất hiện ngẫu nhiên. Chạm để bắt trước khi nó biến mất.'},{title:'Tốc độ',desc:'Mỗi lần bắt được, chấm tiếp theo xuất hiện nhanh hơn.'},{title:'Điểm',desc:'Bắt càng nhanh càng nhiều điểm. Lỡ mất 3 lần là thua.'}],
    en:[{title:'Quick Tap',desc:'A red dot appears randomly. Tap it before it vanishes.'},{title:'Speed',desc:'Each catch makes the next dot appear faster.'},{title:'Score',desc:'Faster catches = more points. Miss 3 times and game over.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const root=document.getElementById('game-root');
  let score=0,level=1,isPlaying=false,misses=0,maxMisses=3,timer=null;

  function spawnDot(){
    if(!isPlaying) return;
    root.innerHTML='';
    const d=document.createElement('div');
    d.className='dot';
    d.style.left=(10+Math.random()*(root.clientWidth-50))+'px';
    d.style.top=(10+Math.random()*(root.clientHeight-50))+'px';
    d.addEventListener('pointerdown',()=>{
      if(!isPlaying) return;
      score+=Math.max(10,30-level);
      hud.setScore(score);
      if(score>=level*100){level++;hud.setLevel(level);}
      clearTimeout(timer);
      spawnDot();
    });
    root.appendChild(d);
    const t=Math.max(800,2500-level*150);
    timer=setTimeout(()=>{
      if(!isPlaying) return;
      misses++;
      if(misses>=maxMisses){endGame();return;}
      spawnDot();
    },t);
  }

  function startGame(){
    document.getElementById('start-overlay').style.display='none';
    score=0;level=1;misses=0;isPlaying=true;
    hud.setScore(0);hud.setLevel(1);
    spawnDot();
  }
  function endGame(){
    isPlaying=false;clearTimeout(timer);
    PlaysSDK.saveScore(GAME_ID,score,{level});
    PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});
  }
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
