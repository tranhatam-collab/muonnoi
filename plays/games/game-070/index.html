<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 070</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-070">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 070</h1>
    <p>Giữ nhân vật trong vùng an toàn đang thu nhỏ dần!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-070';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Vùng An Toàn',desc:'Vùng xanh sẽ thu nhỏ dần. Giữ nhân vật bên trong vùng xanh.'},{title:'Di chuyển',desc:'Dùng chuột hoặc chạm để di chuyển nhân vật.'},{title:'Khó dần',desc:'Vùng xanh thu nhỏ nhanh hơn theo thời gian.'}],
    en:[{title:'Safe Zone',desc:'The green zone shrinks over time. Keep your character inside it.'},{title:'Move',desc:'Use mouse or touch to move your character.'},{title:'Harder',desc:'The safe zone shrinks faster over time.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:160,y:200,r:8};
  let zone={x:40,y:40,w:240,h:320,shrinkRate:0.1};

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#1e293b';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#22c55e33';ctx.fillRect(zone.x,zone.y,zone.w,zone.h);
    ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.strokeRect(zone.x,zone.y,zone.w,zone.h);
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
  }
  function update(){
    if(!isPlaying)return;
    zone.x+=zone.shrinkRate;zone.y+=zone.shrinkRate;zone.w-=zone.shrinkRate*2;zone.h-=zone.shrinkRate*2;
    if(player.x-zone.x<0||player.x-(zone.x+zone.w)>0||player.y-zone.y<0||player.y-(zone.y+zone.h)>0){endGame();return;}
    score++;if(score%500===0){level++;hud.setLevel(level);zone.shrinkRate+=0.05;}
    hud.setScore(score);draw();requestAnimationFrame(update);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;player={x:160,y:200,r:8};zone={x:40,y:40,w:240,h:320,shrinkRate:0.1};hud.setScore(0);hud.setLevel(1);update();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function movePlayer(x,y){const rect=canvas.getBoundingClientRect();player.x=(x-rect.left)*(canvas.width/rect.width);player.y=(y-rect.top)*(canvas.height/rect.height);}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)movePlayer(e.clientX,e.clientY);});
  canvas.addEventListener('pointerdown',e=>{if(isPlaying)movePlayer(e.clientX,e.clientY);});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
