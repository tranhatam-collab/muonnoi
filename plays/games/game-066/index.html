<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 066</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .territory-grid { display:grid; grid-template-columns:repeat(5,50px); grid-template-rows:repeat(5,50px); gap:4px; background:#475569; padding:4px; border-radius:0.375rem; }
  .territory-cell { background:#334155; display:flex; align-items:center; justify-content:center; font-size:1.25rem; cursor:pointer; user-select:none; border-radius:4px; }
  .territory-cell.p1 { background:#3b82f6; }
  .territory-cell.p2 { background:#ef4444; }
</style>
</head>
<body data-game="game-066">

<div id="hud-root"></div>
<div id="game-root">
  <div class="territory-grid" id="territory-grid"></div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 066</h1>
    <p>Chiếm các ô trên lưới 5x5. Người chiếm nhiều hơn thắng!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-066';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Chiếm Lãnh',desc:'Lần lượt chọn ô trống để chiếm. Ô liền kề đối thủ cũng bị chiếm theo.'},{title:'Luật chiếm',desc:'Khi chọn ô liền kề ô đối thủ, ô đó đổi sang màu của bạn.'},{title:'Thắng',desc:'Sau 25 nước, ai chiếm nhiều ô hơn thì thắng.'}],
    en:[{title:'Territory',desc:'Take turns picking empty cells. Adjacent enemy cells flip to your color.'},{title:'Capture Rule',desc:'When you pick a cell next to an enemy cell, it flips to your color.'},{title:'Win',desc:'After 25 moves, whoever owns more cells wins.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('territory-grid');
  let board=[],turn='p1',score=0,level=1,isPlaying=false,moves=0;

  function init(){board=new Array(25).fill(null);turn='p1';moves=0;render();}
  function render(){
    gridEl.innerHTML='';
    for(let i=0;i<25;i++){
      const cell=document.createElement('div');
      cell.className='territory-cell'+(board[i]==='p1'?' p1':board[i]==='p2'?' p2':'');
      cell.textContent=board[i]==='p1'?'●':board[i]==='p2'?'○':'';
      cell.addEventListener('click',()=>onClick(i));
      gridEl.appendChild(cell);
    }
  }
  function onClick(i){
    if(!isPlaying||board[i])return;
    board[i]=turn;
    const r=Math.floor(i/5),c=i%5;
    const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
    dirs.forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<5&&nc>=0&&nc<5){const ni=nr*5+nc;if(board[ni]&&board[ni]!==turn)board[ni]=turn;}});
    moves++;
    if(moves===25){endGame();return;}
    turn=turn==='p1'?'p2':'p1';
    if(turn==='p2'){setTimeout(aiMove,400);}
    render();
  }
  function aiMove(){
    if(!isPlaying)return;
    const empties=board.map((v,i)=>v?-1:i).filter(i=>i!==-1);
    let best=-1,bestScore=-1;
    empties.forEach(i=>{
      const r=Math.floor(i/5),c=i%5;
      let gain=0;
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<5&&nc>=0&&nc<5){const ni=nr*5+nc;if(board[ni]==='p1')gain++;}});
      if(gain>bestScore){bestScore=gain;best=i;}
    });
    if(best===-1)best=empties[Math.floor(Math.random()*empties.length)];
    onClick(best);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();}
  function endGame(){
    isPlaying=false;
    const p1=board.filter(v=>v==='p1').length;
    const p2=board.filter(v=>v==='p2').length;
    if(p1>p2)score+=level*50;
    hud.setScore(score);
    PlaysSDK.saveScore(GAME_ID,score,{level});
    PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{if(p1>p2){level++;hud.setLevel(level);init();}else{location.reload();}});
  }
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
