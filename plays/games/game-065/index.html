<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-65.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 065</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #beam { width:280px; height:24px; background:#334155; border-radius:12px; position:relative; overflow:hidden; }
  #pivot { position:absolute; left:50%; top:0; width:4px; height:100%; background:#fff; transform:translateX(-50%); }
  #balance-bar { position:absolute; left:50%; top:0; height:100%; width:60px; background:#3b82f6; transform:translateX(-50%); transform-origin:center; border-radius:4px; }
  .btn-row { display:flex; gap:1rem; margin-top:1rem; }
  .ctrl-btn { padding:0.5rem 1rem; border:none; border-radius:0.375rem; background:#475569; color:#e2e8f0; cursor:pointer; }
</style>
</head>
<body data-game="game-065">

<div id="hud-root"></div>
<div id="game-root">
  <div id="beam"><div id="pivot"></div><div id="balance-bar"></div></div>
  <div class="btn-row">
    <button class="ctrl-btn" id="btn-left">← Trái</button>
    <button class="ctrl-btn" id="btn-right">Phải →</button>
  </div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 065</h1>
    <p>Giữ thanh cân bằng ở giữa bằng 2 nút trái/phải!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-065';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Cân Bằng',desc:'Thanh xanh sẽ nghiêng do lực ngẫu nhiên. Nhấn trái/phải để giữ thăng bằng.'},{title:'Giới hạn',desc:'Nếu thanh nghiêng quá 45 độ là thua.'},{title:'Khó dần',desc:'Lực ngẫu nhiên mạnh hơn theo thời gian.'}],
    en:[{title:'Balance',desc:'The blue bar tilts from random forces. Tap left/right to keep it level.'},{title:'Limit',desc:'Tilt past 45 degrees and you lose.'},{title:'Harder',desc:'Random forces grow stronger over time.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const barEl=document.getElementById('balance-bar');
  let score=0,level=1,isPlaying=false,angle=0,angularVel=0,force=0,forceTimer=null;

  function update(){
    if(!isPlaying)return;
    angle+=angularVel;
    if(angle>45||angle<-45){endGame();return;}
    barEl.style.transform='translateX(-50%) rotate('+angle+'deg)';
    score++;if(score%600===0){level++;hud.setLevel(level);}
    hud.setScore(score);requestAnimationFrame(update);
  }
  function applyForce(){if(!isPlaying)return;force=(Math.random()-0.5)*(0.02+level*0.005);angularVel+=force;}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;angle=0;angularVel=0;force=0;hud.setScore(0);hud.setLevel(1);update();forceTimer=setInterval(applyForce,300);}
  function endGame(){isPlaying=false;clearInterval(forceTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-left').addEventListener('pointerdown',()=>{if(isPlaying)angularVel-=0.15;});
  document.getElementById('btn-right').addEventListener('pointerdown',()=>{if(isPlaying)angularVel+=0.15;});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
