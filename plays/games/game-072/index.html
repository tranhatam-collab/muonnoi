<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-72.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 072</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
  #controls { display:flex; gap:0.5rem; margin-top:0.5rem; }
</style>
</head>
<body data-game="game-072">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>
<div id="controls">
  <button class="plays-btn plays-btn-primary" id="btn-start" style="padding:0.25rem 0.5rem;font-size:0.75rem;">Bắt đầu</button>
  <button class="plays-btn plays-btn-ghost" id="btn-clear" style="padding:0.25rem 0.5rem;font-size:0.75rem;">Xóa</button>
  <button class="plays-btn plays-btn-ghost" id="btn-tutorial" style="padding:0.25rem 0.5rem;font-size:0.75rem;">Hướng dẫn</button>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-072';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Zen Garden',desc:'Kéo chuột hoặc chạm để tạo các đường cát trên canvas.'},{title:'Thư giãn',desc:'Không có điểm hay thua cuộc. Chỉ để thư giãn.'},{title:'Xóa',desc:'Nhấn nút Xóa để bắt đầu lại.'}],
    en:[{title:'Zen Garden',desc:'Drag mouse or touch to draw sand patterns on the canvas.'},{title:'Relax',desc:'No score or game over. Just relax.'},{title:'Clear',desc:'Tap Clear to start over.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:false});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let isDrawing=false;

  function getPos(e){const rect=canvas.getBoundingClientRect();return{x:(e.clientX-rect.left)*(canvas.width/rect.width),y:(e.clientY-rect.top)*(canvas.height/rect.height)};}
  canvas.addEventListener('pointerdown',e=>{isDrawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle='#eab308';ctx.lineWidth=2;ctx.lineCap='round';});
  canvas.addEventListener('pointermove',e=>{if(!isDrawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('pointerup',()=>{isDrawing=false;});
  document.getElementById('btn-clear').addEventListener('click',()=>ctx.clearRect(0,0,canvas.width,canvas.height));
  document.getElementById('btn-start').addEventListener('click',()=>{hud.setScore(0);});
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
