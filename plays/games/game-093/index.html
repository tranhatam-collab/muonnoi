<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-93.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 093</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-093">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 093</h1>
    <p>Bắn vào mục tiêu di chuyển. Càng chính xác càng nhiều điểm!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-093';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Bắn Mục Tiêu',desc:'Mục tiêu di chuyển ngang. Nhấn để bắn.'},{title:'Chính xác',desc:'Bắn trúng tâm đỏ để ghi nhiều điểm nhất.'},{title:'Giới hạn',desc:'Mỗi màn có số lượt bắn giới hạn.'}],
    en:[{title:'Target Practice',desc:'Targets move horizontally. Tap to shoot.'},{title:'Accuracy',desc:'Hit the red center for max points.'},{title:'Limit',desc:'Each round has limited shots.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let crosshair={x:160,y:200},targets=[],shots=0,maxShots=0;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='#94a3b8';ctx.beginPath();ctx.moveTo(crosshair.x-10,crosshair.y);ctx.lineTo(crosshair.x+10,crosshair.y);ctx.moveTo(crosshair.x,crosshair.y-10);ctx.lineTo(crosshair.x,crosshair.y+10);ctx.stroke();
    targets.forEach(t=>{
      ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(t.x,t.y,20,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(t.x,t.y,10,0,Math.PI*2);ctx.fill();
    });
    ctx.fillStyle='#eab308';ctx.font='12px sans-serif';ctx.fillText('Shots: '+shots+'/'+maxShots,10,20);
  }
  function update(){
    if(!isPlaying)return;
    targets.forEach(t=>{t.x+=t.vx;if(t.x<20||t.x>canvas.width-20)t.vx*=-1;});
    draw();requestAnimationFrame(update);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;crosshair={x:160,y:200};targets=[{x:80,y:100,vx:2},{x:240,y:200,vx:-2},{x:160,y:300,vx:1.5}];shots=0;maxShots=5+level;hud.setScore(0);hud.setLevel(1);update();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function moveCross(cx,cy){const rect=canvas.getBoundingClientRect();crosshair.x=(cx-rect.left)*(canvas.width/rect.width);crosshair.y=(cy-rect.top)*(canvas.height/rect.height);}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)moveCross(e.clientX,e.clientY);});
  canvas.addEventListener('pointerdown',e=>{
    if(!isPlaying)return;
    moveCross(e.clientX,e.clientY);shots++;
    let hit=false;
    for(let i=targets.length-1;i>=0;i--){
      const t=targets[i];const dx=crosshair.x-t.x,dy=crosshair.y-t.y;const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<20){score+=Math.max(10,100-Math.floor(dist*4));hud.setScore(score);hit=true;targets.splice(i,1);break;}
    }
    if(shots>=maxShots){if(targets.length>0)endGame();else{level++;hud.setLevel(level);shots=0;maxShots=5+level;targets=[{x:80,y:80+Math.random()*240,vx:2+level*0.3},{x:240,y:80+Math.random()*240,vx:-2-level*0.3}];}}
    draw();
  });
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
