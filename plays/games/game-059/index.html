<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-59.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 059</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .problem { font-size:2.5rem; font-weight:bold; margin-bottom:1rem; }
  .answer-row { display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center; }
  .ans-btn { width:60px; height:48px; background:#334155; border:none; border-radius:0.375rem; color:#e2e8f0; font-size:1.25rem; cursor:pointer; }
  .ans-btn:active { background:#475569; }
  #timer-bar { width:100%; height:6px; background:#334155; border-radius:3px; margin-bottom:0.75rem; overflow:hidden; }
  #timer-fill { height:100%; background:#22c55e; width:100%; transition:width 0.1s linear; }
</style>
</head>
<body data-game="game-059">

<div id="hud-root"></div>
<div id="game-root">
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div class="problem" id="problem">1 + 1 = ?</div>
  <div class="answer-row" id="answer-row"></div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 059</h1>
    <p>Tính nhẩm nhanh các phép cộng trừ. Chọn đúng đáp án!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-059';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Tính Nhẩm',desc:'Một phép tính sẽ hiện ra. Chọn đáp án đúng nhanh nhất có thể.'},{title:'Thời gian',desc:'Mỗi màn có thanh thời gian. Hết giờ là thua.'},{title:'Khó dần',desc:'Số lớn hơn và phép trừ xuất hiện nhiều hơn ở các màn sau.'}],
    en:[{title:'Rapid Math',desc:'A math problem appears. Pick the correct answer as fast as you can.'},{title:'Timer',desc:'Each round has a timer. Run out = game over.'},{title:'Harder',desc:'Bigger numbers and more subtraction in later levels.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const problemEl=document.getElementById('problem');
  const answerRow=document.getElementById('answer-row');
  const timerFill=document.getElementById('timer-fill');
  let score=0,level=1,isPlaying=false,timeLeft=0,maxTime=0,timerId=null;

  function getConfig(lv){return{max:5+lv*2,time:Math.max(4,10-lv*0.3)};}
  function startLevel(){
    const cfg=getConfig(level);maxTime=cfg.time;timeLeft=cfg.time;
    const isAdd=Math.random()>0.4||level<3;
    const a=1+Math.floor(Math.random()*cfg.max);
    const b=1+Math.floor(Math.random()*cfg.max);
    const ans=isAdd?a+b:a-b;
    problemEl.textContent=(isAdd?a+' + '+b:a+' - '+b)+' = ?';
    const answers=new Set([ans]);
    while(answers.size<4)answers.add(ans+Math.floor(Math.random()*10)-5);
    const arr=[...answers].sort(()=>Math.random()-0.5);
    answerRow.innerHTML='';
    arr.forEach(v=>{
      const btn=document.createElement('button');
      btn.className='ans-btn';btn.textContent=v;
      btn.addEventListener('click',()=>{
        if(!isPlaying)return;
        if(v===ans){score+=Math.floor(timeLeft*5)+level*10;hud.setScore(score);level++;hud.setLevel(level);startLevel();}
        else{endGame();}
      });
      answerRow.appendChild(btn);
    });
    timerFill.style.width='100%';timerFill.style.background='#22c55e';
    clearInterval(timerId);
    timerId=setInterval(()=>{if(!isPlaying)return;timeLeft-=0.1;const pct=Math.max(0,timeLeft/maxTime*100);timerFill.style.width=pct+'%';if(pct<30)timerFill.style.background='#ef4444';if(timeLeft<=0)endGame();},100);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);startLevel();}
  function endGame(){isPlaying=false;clearInterval(timerId);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
