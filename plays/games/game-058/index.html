<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 058</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-058">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 058</h1>
    <p>Di chuyển né các bức tường tiến đến từ phải!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-058';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Né Tường',desc:'Các bức tường di chuyển từ phải sang. Dùng chuột hoặc chạm để di chuyển lên xuống.'},{title:'Khe hở',desc:'Tường có khe hở. Di chuyển qua khe hở để sống sót.'},{title:'Khó dần',desc:'Tường di chuyển nhanh hơn theo thời gian.'}],
    en:[{title:'Dodge Walls',desc:'Walls move from right to left. Use mouse or touch to move up/down.'},{title:'Gaps',desc:'Walls have gaps. Move through gaps to survive.'},{title:'Harder',desc:'Walls speed up over time.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:40,y:200,r:8};
  let walls=[],wallTimer=null,speed=2;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ef4444';
    walls.forEach(w=>{ctx.fillRect(w.x,0,w.w,w.gapY);ctx.fillRect(w.x,w.gapY+w.gapH,w.w,canvas.height-w.gapY-w.gapH);});
  }
  function update(){
    if(!isPlaying)return;
    walls.forEach(w=>w.x-=speed);
    walls=walls.filter(w=>w.x+w.w>0);
    for(const w of walls){
      if(player.x+player.r>w.x&&player.x-player.r<w.x+w.w){
        if(player.y-player.r<w.gapY||player.y+player.r>w.gapY+w.gapH){endGame();return;}
      }
    }
    score++;if(score%300===0){level++;hud.setLevel(level);speed+=0.5;}
    hud.setScore(score);draw();requestAnimationFrame(update);
  }
  function spawnWall(){
    if(!isPlaying)return;
    const gapH=50+Math.random()*40;
    const gapY=20+Math.random()*(canvas.height-gapH-40);
    walls.push({x:canvas.width,w:20,gapY:gapY,gapH:gapH});
  }
  function startGame(){
    document.getElementById('start-overlay').style.display='none';
    score=0;level=1;isPlaying=true;player={x:40,y:200,r:8};walls=[];speed=2;
    hud.setScore(0);hud.setLevel(1);update();
    wallTimer=setInterval(spawnWall,1800);
  }
  function endGame(){isPlaying=false;clearInterval(wallTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function movePlayer(y){const rect=canvas.getBoundingClientRect();player.y=(y-rect.top)*(canvas.height/rect.height);player.y=Math.max(player.r,Math.min(canvas.height-player.r,player.y));}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)movePlayer(e.clientY);});
  canvas.addEventListener('pointerdown',e=>{if(isPlaying)movePlayer(e.clientY);});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
