<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-79.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 079</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-079">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 079</h1>
    <p>Nhảy qua các hố sâu để chạy vô cực!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-079';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Nhảy Qua Hố',desc:'Nhân vật chạy tự động. Nhấn để nhảy qua các hố sâu.'},{title:'Thời điểm',desc:'Nhảy quá sớm hoặc muộn đều rơi xuống.'},{title:'Tốc độ',desc:'Càng chạy xa, tốc độ càng nhanh.'}],
    en:[{title:'Jump Pits',desc:'Character runs automatically. Tap to jump over pits.'},{title:'Timing',desc:'Jump too early or late and you fall.'},{title:'Speed',desc:'The further you run, the faster it gets.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:60,y:320,vy:0,r:12,ground:320};
  let pits=[],pitTimer=null,scrollSpeed=3;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#22c55e';ctx.fillRect(0,player.ground+12,canvas.width,canvas.height-player.ground-12);
    ctx.fillStyle='#1e293b';
    pits.forEach(p=>{ctx.fillRect(p.x,player.ground+12,p.w,canvas.height-player.ground-12);});
    ctx.fillStyle='#eab308';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
  }
  function update(){
    if(!isPlaying)return;
    player.y+=player.vy;player.vy+=0.6;
    if(player.y>player.ground){player.y=player.ground;player.vy=0;}
    pits.forEach(p=>p.x-=scrollSpeed);
    pits=pits.filter(p=>p.x+p.w>0);
    for(const p of pits){
      if(player.x+player.r>p.x&&player.x-player.r<p.x+p.w&&player.y+player.r>player.ground+10){endGame();return;}
    }
    score+=Math.floor(scrollSpeed/2);if(score%500===0){level++;hud.setLevel(level);scrollSpeed+=0.5;}
    hud.setScore(score);draw();requestAnimationFrame(update);
  }
  function spawnPit(){if(!isPlaying)return;pits.push({x:canvas.width,w:40+Math.random()*40});}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;player={x:60,y:320,vy:0,r:12,ground:320};pits=[];scrollSpeed=3;hud.setScore(0);hud.setLevel(1);update();pitTimer=setInterval(spawnPit,2000);}
  function endGame(){isPlaying=false;clearInterval(pitTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  canvas.addEventListener('pointerdown',()=>{if(isPlaying&&player.y>=player.ground-1)player.vy=-12;});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
