<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Gõ đoạn văn ngẫu nhiên càng nhanh và chính xác càng tốt.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Luyện Gõ Chữ</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .target-text { font-size:1.25rem; line-height:1.6; text-align:center; margin-bottom:1rem; min-height:3.2rem; }
  .target-text span { transition:color 0.1s; }
  .target-text span.correct { color:#22c55e; }
  .target-text span.wrong { color:#ef4444; }
  .target-text span.pending { color:#94a3b8; }
  #typed { width:100%; padding:0.75rem; font-size:1rem; border:none; border-radius:0.375rem; background:#334155; color:#e2e8f0; text-align:center; outline:none; }
  #info { margin-top:0.5rem; font-size:0.75rem; color:#64748b; }
  #timer-bar { width:100%; height:6px; background:#334155; border-radius:3px; margin-bottom:0.75rem; overflow:hidden; }
  #timer-fill { height:100%; background:#22c55e; width:100%; transition:width 0.1s linear; }
</style>
</head>
<body data-game="luyen-go-chu">

<div id="hud-root"></div>
<div id="game-root">
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div class="target-text" id="target-text"></div>
  <input type="text" id="typed" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div id="info">Gõ đúng câu hiển thị</div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Luyện Gõ Chữ</h1>
    <p>Gõ đúng câu hiển thị càng nhanh càng tốt. Sai chữ sẽ bị trừ thời gian!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Nhấn để bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function() {
  'use strict';
  const GAME_ID = 'luyen-go-chu';
  const LANG = document.documentElement.lang === 'en' ? 'en' : 'vi';
  const TUTORIAL_STEPS = {
    vi: [
      { title: 'Luyện Gõ Chữ', desc: 'Một câu sẽ hiện ra. Gõ chính xác từng chữ vào ô nhập liệu.' },
      { title: 'Tốc độ', desc: 'Càng nhanh càng nhiều điểm. Hoàn thành câu trước khi thanh thời gian hết.' },
      { title: 'Lỗi', desc: 'Gõ sai chữ sẽ bị trừ thời gian. Cẩn thận!' },
    ],
    en: [
      { title: 'Typing Drill', desc: 'A sentence appears. Type it exactly into the input box.' },
      { title: 'Speed', desc: 'Faster = more points. Finish before the timer bar runs out.' },
      { title: 'Mistakes', desc: 'Wrong letters reduce time. Be careful!' },
    ],
  };
  const hud = PlaysSDK.createHud('hud-root', { showLevel: true });
  const targetEl = document.getElementById('target-text');
  const inputEl = document.getElementById('typed');
  const timerFill = document.getElementById('timer-fill');

  const SENTENCES = [
    'Con mèo đen chạy qua sân',
    'Mùa xuân đến hoa nở rộ',
    'Bầu trời xanh và trong',
    'Em bé cười rất tươi',
    'Cơn mưa rào qua nhanh',
    'Bánh mì nóng hổi thơm',
    'Đường phố đông đúc quá',
    'Cô giáo dạy rất hay',
    'Chú chó vàng chạy nhanh',
    'Bông hoa hồng đẹp quá',
  ];

  let score = 0, level = 1, isPlaying = false, current = '', timeLeft = 0, maxTime = 0, timerId = null;

  function getConfig(lv) {
    return { time: Math.max(8, 20 - lv) };
  }

  function startLevel() {
    const cfg = getConfig(level);
    maxTime = cfg.time; timeLeft = cfg.time;
    current = SENTENCES[Math.floor(Math.random() * SENTENCES.length)];
    renderTarget();
    inputEl.value = '';
    inputEl.focus();
    timerFill.style.width = '100%'; timerFill.style.background = '#22c55e';
    clearInterval(timerId);
    timerId = setInterval(() => {
      if (!isPlaying) return;
      timeLeft -= 0.1;
      const pct = Math.max(0, timeLeft / maxTime * 100);
      timerFill.style.width = pct + '%';
      if (pct < 30) timerFill.style.background = '#ef4444';
      else if (pct < 60) timerFill.style.background = '#eab308';
      if (timeLeft <= 0) endGame();
    }, 100);
  }

  function renderTarget() {
    targetEl.innerHTML = '';
    for (const ch of current) {
      const span = document.createElement('span');
      span.className = 'pending';
      span.textContent = ch;
      targetEl.appendChild(span);
    }
  }

  function upđãteColors(typed) {
    const spans = targetEl.children;
    for (let i = 0; i < spans.length; i++) {
      if (i < typed.length) {
        spans[i].className = typed[i] === current[i] ? 'correct' : 'wrong';
      } else {
        spans[i].className = 'pending';
      }
    }
  }

  inputEl.addEventListener('input', () => {
    if (!isPlaying) return;
    const val = inputEl.value;
    upđãteColors(val);
    // Penalize wrong char at current position
    if (val.length > 0 && val[val.length - 1] !== current[val.length - 1]) {
      timeLeft = Math.max(0, timeLeft - 1);
    }
    if (val === current) {
      score += Math.floor(timeLeft * 5 + level * 10);
      hud.setScore(score);
      level++;
      hud.setLevel(level);
      setTimeout(startLevel, 300);
    }
  });

  function startGame() {
    document.getElementById('start-overlay').style.display = 'none';
    score = 0; level = 1; isPlaying = true;
    hud.setScore(0); hud.setLevel(1);
    startLevel();
  }

  function endGame() {
    isPlaying = false;
    clearInterval(timerId);
    PlaysSDK.saveScore(GAME_ID, score, { level });
    PlaysSDK.showGameOver(GAME_ID, score, { level }, () => { location.reload(); });
  }

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-tutorial').addEventListener('click', () => {
    PlaysSDK.showTutorial(GAME_ID, TUTORIAL_STEPS[LANG]);
  });
})();
</script>
</body>
</html>
