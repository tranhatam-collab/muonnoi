<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-85.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 085</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  .dot { position:absolute; width:50px; height:50px; background:#ef4444; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold; }
</style>
</head>
<body data-game="game-085">

<div id="hud-root"></div>
<div id="game-root"></div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 085</h1>
    <p>Chấm đỏ xuất hiện ngẫu nhiên. Chạm càng nhanh càng tốt!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-085';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Chạm Nhanh',desc:'Chấm đỏ xuất hiện ngẫu nhiên. Chạm ngay để ghi điểm.'},{title:'Thời gian',desc:'Chấm biến mất sau vài giây. Lỡ mất là thua.'},{title:'Khó dần',desc:'Chấm xuất hiện nhanh hơn và biến mất nhanh hơn.'}],
    en:[{title:'Quick Tap',desc:'A red dot appears randomly. Tap it immediately to score.'},{title:'Timer',desc:'The dot vanishes after a few seconds. Miss = game over.'},{title:'Harder',desc:'Dots appear faster and disappear quicker.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const root=document.getElementById('game-root');
  let score=0,level=1,isPlaying=false,timerId=null;

  function spawn(){
    if(!isPlaying)return;
    root.innerHTML='';
    const d=document.createElement('div');
    d.className='dot';d.textContent='!';
    d.style.left=(10+Math.random()*(root.clientWidth-60))+'px';
    d.style.top=(10+Math.random()*(root.clientHeight-60))+'px';
    const t=Math.max(500,2000-level*150);
    d.addEventListener('pointerdown',()=>{
      if(!isPlaying)return;
      score+=Math.floor(t/50);hud.setScore(score);
      if(score>=level*100){level++;hud.setLevel(level);}
      clearTimeout(timerId);spawn();
    });
    root.appendChild(d);
    timerId=setTimeout(()=>{if(isPlaying)endGame();},t);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);spawn();}
  function endGame(){isPlaying=false;clearTimeout(timerId);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
