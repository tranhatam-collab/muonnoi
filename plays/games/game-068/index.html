<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-68.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 068</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .pattern-grid { display:grid; grid-template-columns:repeat(3,80px); grid-template-rows:repeat(3,80px); gap:8px; }
  .pattern-cell { background:#334155; border-radius:0.5rem; display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:pointer; user-select:none; transition:background 0.2s; }
  .pattern-cell.lit { background:#eab308; }
  #status { margin-top:0.75rem; font-size:0.875rem; color:#94a3b8; }
</style>
</head>
<body data-game="game-068">

<div id="hud-root"></div>
<div id="game-root">
  <div class="pattern-grid" id="pattern-grid"></div>
  <div id="status">Quan sát...</div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 068</h1>
    <p>Quan sát và lặp lại chuỗi hình sáng lên!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-068';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Quan Sát',desc:'Các ô sẽ sáng lên theo chuỗi. Hãy nhớ thứ tự.'},{title:'Lặp Lại',desc:'Sau khi chuỗi kết thúc, nhấn các ô theo đúng thứ tự đã thấy.'},{title:'Khó dần',desc:'Chuỗi dài hơn ở các màn sau.'}],
    en:[{title:'Watch',desc:'Cells light up in a sequence. Remember the order.'},{title:'Repeat',desc:'After the sequence ends, tap the cells in the same order.'},{title:'Harder',desc:'Sequences get longer in later levels.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('pattern-grid');
  const statusEl=document.getElementById('status');
  let sequence=[],inputIndex=0,score=0,level=1,isPlaying=false,locked=true;

  function render(){
    gridEl.innerHTML='';
    for(let i=0;i<9;i++){
      const cell=document.createElement('div');
      cell.className='pattern-cell';
      cell.dataset.idx=i;
      cell.addEventListener('click',()=>onClick(i));
      gridEl.appendChild(cell);
    }
  }
  async function playSequence(){
    locked=true;statusEl.textContent=LANG==='vi'?'Quan sát...':'Watch...';
    await new Promise(r=>setTimeout(r,600));
    for(const idx of sequence){
      const cell=gridEl.children[idx];
      cell.classList.add('lit');await new Promise(r=>setTimeout(r,400));
      cell.classList.remove('lit');await new Promise(r=>setTimeout(r,200));
    }
    locked=false;inputIndex=0;statusEl.textContent=LANG==='vi'?'Lặp lại...':'Repeat...';
  }
  function onClick(i){
    if(!isPlaying||locked)return;
    const cell=gridEl.children[i];cell.classList.add('lit');setTimeout(()=>cell.classList.remove('lit'),200);
    if(i!==sequence[inputIndex]){endGame();return;}
    inputIndex++;
    if(inputIndex===sequence.length){score+=level*20;hud.setScore(score);level++;hud.setLevel(level);sequence.push(Math.floor(Math.random()*9));setTimeout(playSequence,600);}
  }
  function startGame(){
    document.getElementById('start-overlay').style.display='none';
    score=0;level=1;isPlaying=true;sequence=[Math.floor(Math.random()*9)];
    hud.setScore(0);hud.setLevel(1);render();playSequence();
  }
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
