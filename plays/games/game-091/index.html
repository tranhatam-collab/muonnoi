<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 091</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-091">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 091</h1>
    <p>Nhảy lên các bậc thang leo vô cực!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-091';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Leo Thang',desc:'Nhảy lên các bậc thang di chuyển sang trái/phải.'},{title:'Rơi xuống',desc:'Nếu rơi xuống dưới màn hình là thua.'},{title:'Tốc độ',desc:'Thang di chuyển nhanh hơn theo thời gian.'}],
    en:[{title:'Climb Up',desc:'Jump onto steps moving left and right.'},{title:'Fall',desc:'Fall below the screen = game over.'},{title:'Speed',desc:'Steps move faster over time.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:160,y:350,vy:0,r:10};
  let steps=[],speed=2;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#22c55e';
    steps.forEach(s=>{ctx.fillRect(s.x,s.y,s.w,8);});
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
  }
  function update(){
    if(!isPlaying)return;
    player.y-=2;steps.forEach(s=>{s.y+=2;s.x+=Math.sin(s.offset)*speed;s.offset+=0.02;});
    if(player.y<canvas.height/2)player.y=canvas.height/2;
    steps=steps.filter(s=>s.y<canvas.height+20);
    if(steps.length<6)steps.push({x:20+Math.random()*(canvas.width-100),y:-10,w:60+Math.random()*40,offset:Math.random()*10});
    let onStep=false;
    for(const s of steps){
      if(player.x>s.x&&player.x<s.x+s.w&&player.y+player.r>s.y-5&&player.y+player.r<s.y+15){player.y=s.y-player.r;player.vy=0;onStep=true;break;}
    }
    if(!onStep)player.vy+=0.3;
    player.y+=player.vy;
    if(player.y>canvas.height){endGame();return;}
    score++;if(score%500===0){level++;hud.setLevel(level);speed+=0.5;}
    hud.setScore(score);draw();requestAnimationFrame(update);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;player={x:160,y:350,vy:0,r:10};steps=[{x:100,y:380,w:120,offset:0}];speed=2;hud.setScore(0);hud.setLevel(1);update();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function movePlayer(cx){const rect=canvas.getBoundingClientRect();player.x=(cx-rect.left)*(canvas.width/rect.width);}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)movePlayer(e.clientX);});
  canvas.addEventListener('pointerdown',e=>{if(isPlaying)movePlayer(e.clientX);});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
