<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="description" content="Tính chi phí thu hút khách hàng."/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Tính CAC · Muôn Nơi Plays</title>
  <link rel="stylesheet" href="../../assets/plays.css">
  <style>
    .game-box{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:20px;text-align:center;margin:16px 0}
    .game-box h3{margin:0 0 8px}
    .actions{display:flex;gap:10px;justify-content:center;margin:16px 0}
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="game-top">
      <a class="back" href="../../index.html">‹ Tất cả game</a>
      <div class="brand"><div class="mark"></div><b>Tính CAC</b></div>
    </div>
    <div class="hud">
      <div class="stat"><div class="k">Điểm</div><div class="v" id="hScore">0</div></div>
      <div class="stat"><div class="k">Mức</div><div class="v" id="hLevel">1</div></div>
    </div>
    <div class="stage" id="stage">
      <div class="overlay" id="overlay">
        <h2>Tính CAC</h2>
        <p class="small">Tính chi phí thu hút khách hàng.</p>
        <button class="btn" id="startBtn">Bắt đầu</button>
        <div class="note" id="ovBest"></div>
      </div>
      <div id="gameArea" style="display:none">
        <div class="game-box">
          <h3>🎮 Tính CAC</h3>
          <p class="small">Tính chi phí thu hút khách hàng.</p>
          <div class="actions">
            <button class="btn" id="playBtn">▶ Chơi</button>
            <button class="btn seconđãry" id="scoreBtn">💾 Lưu điểm</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../assets/plays-sdk.js"></script>
  <script>
    let score=0,level=1;
    document.getElementById('startBtn').onclick = ()=>{
      document.getElementById('overlay').style.display='none';
      document.getElementById('gameArea').style.display='';
    };
    document.getElementById('playBtn').onclick = ()=>{
      score += 10;
      document.getElementById('hScore').textContent = score;
      alert('+10 điểm!');
    };
    document.getElementById('scoreBtn').onclick = ()=>{
      MNPlays.saveProgress('cac-calculate',{score,level});
      alert('Đã lưu: ' + score + 'đ');
    };
    (async()=>{
      const p=await MNPlays.loadProgress('cac-calculate');
      if(p){score=p.score||0;level=p.level||1;document.getElementById('hScore').textContent=score;document.getElementById('hLevel').textContent=level;}
      document.getElementById('ovBest').textContent = p?`Kỷ lục: ${p.score||0}đ`:'';
    })();
  </script>
</body>
</html>
