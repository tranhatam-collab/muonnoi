<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="description" content="Sắp xếp các từ để tạo thành câu tiếng Anh đúng. Càng nhiều câu, điểm càng cao!"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Xây Câu · Muôn Nơi Plays</title>
  <link rel="stylesheet" href="../../assets/plays.css">
  <style>
    .target{background:var(--card);border:2px dashed var(--line);border-radius:12px;padding:16px;min-height:48px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:16px 0}
    .target .slot{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer}
    .target .slot:hover{background:var(--card)}
    .pool{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0}
    .pool button{background:var(--card);border:2px solid var(--line);border-radius:10px;padding:8px 14px;font-size:14px;cursor:pointer}
    .pool button:hover{border-color:var(--brand)}
    .pool button:disabled{opacity:.4;cursor:not-allowed}
    .correct .target{border-color:var(--ok)!important;border-style:solid!important}
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="game-top">
      <a class="back" href="../../index.html">‹ Tất cả game</a>
      <div class="brand"><div class="mark"></div><b>Xây Câu</b></div>
    </div>
    <div class="hud">
      <div class="stat"><div class="k">Mức</div><div class="v" id="hLevel">1</div></div>
      <div class="stat"><div class="k">Điểm</div><div class="v" id="hScore">0</div></div>
      <div class="stat"><div class="k">Hoàn thành</div><div class="v" id="hDone">0</div></div>
    </div>
    <div class="stage" id="stage">
      <div id="gameArea" style="display:none">
        <div class="small" style="text-align:center;color:var(--muted)">Sắp xếp từ để tạo thành câu đúng</div>
        <div class="target" id="target"></div>
        <div class="pool" id="pool"></div>
        <div style="text-align:center;margin:8px 0"><button class="btn secondary" id="resetBtn">↺ Làm lại</button></div>
      </div>
      <div class="overlay" id="overlay">
        <h2>Xây Câu</h2>
        <p class="small">Sắp xếp các từ để tạo thành câu tiếng Anh đúng. Càng nhiều câu, điểm càng cao!</p>
        <button class="btn" id="startBtn">Bắt đầu</button>
        <div class="note" id="ovBest"></div>
      </div>
    </div>
  </div>
  <script src="../../assets/plays-sdk.js"></script>
  <script>
    const SENTENCES = [
      {words:['The','cat','is','sleeping'],vn:'Con mèo đang ngủ'},{words:['I','love','my','family'],vn:'Tôi yêu gia đình tôi'},
      {words:['She','reads','a','book'],vn:'Cô ấy đọc một cuốn sách'},{words:['The','sun','is','bright'],vn:'Mặt trời sáng chói'},
      {words:['We','play','in','the','park'],vn:'Chúng tôi chơi ở công viên'},{words:['He','drinks','water'],vn:'Anh ấy uống nước'},
      {words:['The','dog','runs','fast'],vn:'Con chó chạy nhanh'},{words:['My','friend','is','kind'],vn:'Bạn tôi tốt bụng'},
      {words:['Birds','fly','in','the','sky'],vn:'Chim bay trên trời'},{words:['She','draws','a','flower'],vn:'Cô ấy vẽ một bông hoa'},
      {words:['The','children','love','games'],vn:'Trẻ em thích trò chơi'},{words:['I','see','a','star'],vn:'Tôi thấy một ngôi sao'},
      {words:['The','tree','is','tall'],vn:'Cái cây cao'},{words:['Fish','swim','in','water'],vn:'Cá bơi trong nước'},
      {words:['The','moon','shines','at','night'],vn:'Mặt trăng sáng vào ban đêm'}
    ];
    let level=1,score=0,done=0,current=null,placed=[];
    const hLevel=document.getElementById('hLevel'),hScore=document.getElementById('hScore'),hDone=document.getElementById('hDone');
    const targetEl=document.getElementById('target'),poolEl=document.getElementById('pool');

    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    function pick(){return SENTENCES[Math.floor(Math.random()*SENTENCES.length)];}
    function makeRound(){
      placed=[]; current = pick();
      targetEl.innerHTML = '';
      const shuffled = shuffle([...current.words]);
      poolEl.innerHTML = shuffled.map((w,i)=>`<button data-w="${w}" data-i="${i}">${w}</button>`).join('');
      poolEl.querySelectorAll('button').forEach(b=>{b.onclick = ()=>place(b);});
    }
    function place(btn){
      const w = btn.dataset.w;
      placed.push(w); btn.disabled = true;
      targetEl.innerHTML = placed.map((p,i)=>`<span class="slot" data-i="${i}">${p}</span>`).join('');
      targetEl.querySelectorAll('.slot').forEach(s=>{s.onclick = ()=>unplace(s);});
      checkComplete();
    }
    function unplace(slot){
      const idx = parseInt(slot.dataset.i);
      const w = placed[idx];
      placed = placed.filter((_,i)=>i!==idx);
      targetEl.innerHTML = placed.map((p,i)=>`<span class="slot" data-i="${i}">${p}</span>`).join('');
      targetEl.querySelectorAll('.slot').forEach(s=>{s.onclick = ()=>unplace(s);});
      poolEl.querySelectorAll('button').forEach(b=>{if(b.dataset.w===w && b.disabled) b.disabled=false;});
    }
    function checkComplete(){
      if(placed.length !== current.words.length) return;
      const correct = placed.every((w,i)=>w===current.words[i]);
      if(correct){
        targetEl.style.borderColor='var(--ok)'; targetEl.style.borderStyle='solid';
        done++; score += 20 + level*5;
        hDone.textContent=done; hScore.textContent=score;
        if(done>=level*3){level++; hLevel.textContent=level;}
        poolEl.querySelectorAll('button').forEach(b=>b.disabled=true);
        MNPlays.saveProgress('xay-cau',{level,score});
        setTimeout(()=>{targetEl.style.borderColor=''; targetEl.style.borderStyle=''; makeRound();}, 1200);
      }
    }
    document.getElementById('resetBtn').onclick = ()=>{placed=[]; targetEl.innerHTML=''; poolEl.querySelectorAll('button').forEach(b=>b.disabled=false);};
    document.getElementById('startBtn').onclick = ()=>{
      document.getElementById('overlay').style.display='none';
      document.getElementById('gameArea').style.display='';
      makeRound();
    };
    (async()=>{
      const p=await MNPlays.loadProgress('xay-cau');
      if(p){level=p.level||1;score=p.score||0;hLevel.textContent=level;hScore.textContent=score;}
      document.getElementById('ovBest').textContent = p?`Kỷ lục: Mức ${p.level||1} · ${p.score||0}đ`:'';
    })();
  </script>
</body>
</html>
