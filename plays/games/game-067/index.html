<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-67.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 067</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #click-zone { width:280px; height:280px; background:#334155; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:3rem; user-select:none; }
  #click-zone:active { background:#475569; }
  #timer-text { margin-top:0.5rem; font-size:1.25rem; }
</style>
</head>
<body data-game="game-067">

<div id="hud-root"></div>
<div id="game-root">
  <div id="click-zone">👆</div>
  <div id="timer-text">10.0s</div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 067</h1>
    <p>Chạm liên tục vào vòng tròn trong 10 giây. Càng nhiều càng tốt!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-067';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Click Race',desc:'Chạm liên tục vào vòng tròn trong 10 giây.'},{title:'Combo',desc:'Chạm càng nhanh, điểm càng cao. Dừng lại là mất combo.'},{title:'Thử thách',desc:'Mỗi màn thời gian giảm 0.5 giây.'}],
    en:[{title:'Click Race',desc:'Tap the circle repeatedly within the time limit.'},{title:'Combo',desc:'Faster tapping = higher score. Stopping breaks combo.'},{title:'Challenge',desc:'Each round time decreases by 0.5 seconds.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const clickZone=document.getElementById('click-zone');
  const timerText=document.getElementById('timer-text');
  let score=0,level=1,isPlaying=false,timeLeft=0,maxTime=0,timerId=null;

  function startGame(){
    document.getElementById('start-overlay').style.display='none';
    score=0;level=1;isPlaying=true;maxTime=10;timeLeft=maxTime;
    hud.setScore(0);hud.setLevel(1);
    timerId=setInterval(()=>{
      if(!isPlaying)return;
      timeLeft-=0.1;
      timerText.textContent=Math.max(0,timeLeft).toFixed(1)+'s';
      if(timeLeft<=0)endGame();
    },100);
  }
  function endGame(){isPlaying=false;clearInterval(timerId);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  clickZone.addEventListener('pointerdown',()=>{
    if(!isPlaying)return;
    score+=1+Math.floor(level/2);hud.setScore(score);
    if(score>=level*50){level++;hud.setLevel(level);maxTime=Math.max(5,10-level*0.5);timeLeft=maxTime;}
  });
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
