<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 062</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
  .palette { display:flex; gap:0.25rem; margin-top:0.5rem; }
  .swatch { width:28px; height:28px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
  .swatch.active { border-color:#fff; }
  #controls { display:flex; gap:0.5rem; align-items:center; margin-top:0.5rem; }
</style>
</head>
<body data-game="game-062">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>
<div id="controls">
  <div class="palette" id="palette"></div>
  <button class="plays-btn plays-btn-primary" id="btn-clear" style="padding:0.25rem 0.5rem;font-size:0.75rem;">Clear</button>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 062</h1>
    <p>Vẽ tự do trên canvas để thư giãn. Không điểm, không thua!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-062';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Vẽ Tự Do',desc:'Dùng chuột hoặc chạm để vẽ trên canvas.'},{title:'Chọn màu',desc:'Chọn màu từ bảng màu dưới cùng.'},{title:'Thư giãn',desc:'Đây là game thư giãn. Không có điểm hay thua cuộc.'}],
    en:[{title:'Free Paint',desc:'Use mouse or touch to draw on the canvas.'},{title:'Pick Color',desc:'Choose a color from the bottom palette.'},{title:'Relax',desc:'This is a relaxing experience. No score or game over.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:false});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  const palette=document.getElementById('palette');
  const COLORS=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899','#fff'];
  let color='#3b82f6',isDrawing=false;

  COLORS.forEach(c=>{
    const s=document.createElement('div');
    s.className='swatch'+(c===color?' active':'');
    s.style.background=c;
    s.addEventListener('click',()=>{color=c;document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));s.classList.add('active');});
    palette.appendChild(s);
  });

  function getPos(e){const rect=canvas.getBoundingClientRect();return{x:(e.clientX-rect.left)*(canvas.width/rect.width),y:(e.clientY-rect.top)*(canvas.height/rect.height)};}
  canvas.addEventListener('pointerdown',e=>{isDrawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineCap='round';});
  canvas.addEventListener('pointermove',e=>{if(!isDrawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('pointerup',()=>{isDrawing=false;});
  document.getElementById('btn-clear').addEventListener('click',()=>ctx.clearRect(0,0,canvas.width,canvas.height));
  document.getElementById('btn-start').addEventListener('click',()=>{document.getElementById('start-overlay').style.display='none';hud.setScore(0);});
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
