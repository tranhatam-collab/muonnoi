<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-87.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 087</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-087">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 087</h1>
    <p>Đưa vòng tròn qua đường dây mà không chạm!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-087';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Vòng Qua Dây',desc:'Di chuyển chuột để đưa vòng tròn đi từ đầu này sang đầu kia.'},{title:'Không chạm',desc:'Nếu vòng chạm dây là thua.'},{title:'Khó dần',desc:'Đường dây uốn lượn phức tạp hơn theo màn.'}],
    en:[{title:'Wire Loop',desc:'Move mouse to guide the ring from start to finish.'},{title:'No Touch',desc:'If the ring touches the wire, you lose.'},{title:'Harder',desc:'Wires get more winding in later levels.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let ring={x:40,y:40,r:15},path=[],pathOffset=0,speed=1;

  function init(){
    path=[];
    const segments=10+level*2;
    for(let i=0;i<segments;i++){
      path.push({x:40+i*(canvas.width-80)/(segments-1),y:100+Math.sin(i)*60+Math.random()*40});
    }
    ring={x:path[0].x,y:path[0].y,r:15};pathOffset=0;
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='#22c55e';ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(path[0].x,path[0].y);for(let i=1;i<path.length;i++)ctx.lineTo(path[i].x,path[i].y);ctx.stroke();
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(ring.x,ring.y,ring.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#eab308';ctx.beginPath();ctx.arc(path[path.length-1].x,path[path.length-1].y,10,0,Math.PI*2);ctx.fill();
  }
  function update(){
    if(!isPlaying)return;
    pathOffset+=speed;
    if(pathOffset>=path.length-1){score+=level*50;hud.setScore(score);level++;hud.setLevel(level);init();draw();return;}
    const i=Math.floor(pathOffset);const t=pathOffset-i;
    const x=path[i].x+(path[i+1].x-path[i].x)*t;
    const y=path[i].y+(path[i+1].y-path[i].y)*t;
    for(let j=0;j<path.length-1;j++){
      const a=path[j],b=path[j+1];
      const dist=Math.abs((b.y-a.y)*ring.x-(b.x-a.x)*ring.y+b.x*a.y-b.y*a.x)/Math.sqrt((b.y-a.y)**2+(b.x-a.x)**2);
      if(dist<ring.r-4){endGame();return;}
    }
    ring.x=x;ring.y=y;
    draw();requestAnimationFrame(update);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();update();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
