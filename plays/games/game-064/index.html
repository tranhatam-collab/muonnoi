<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-64.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 064</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .match-grid { display:grid; grid-template-columns:repeat(6,40px); grid-template-rows:repeat(6,40px); gap:2px; background:#475569; padding:4px; border-radius:0.375rem; }
  .match-cell { width:40px; height:40px; background:#334155; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:1.25rem; cursor:pointer; user-select:none; }
  .match-cell.selected { outline:2px solid #eab308; }
</style>
</head>
<body data-game="game-064">

<div id="hud-root"></div>
<div id="game-root">
  <div class="match-grid" id="match-grid"></div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 064</h1>
    <p>Hoán đổi 2 ô liền kề để tạo hàng 3 giống nhau!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-064';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Xếp 3',desc:'Lưới 6x6 với các biểu tượng. Hoán đổi 2 ô liền kề để tạo hàng/cột 3 giống nhau.'},{title:'Hoán đổi',desc:'Chọn 1 ô, rồi chọn ô liền kề để hoán đổi.'},{title:'Điểm',desc:'Mỗi lần xóa được 3, bạn ghi điểm. Càng nhiều liên tiếp càng tốt.'}],
    en:[{title:'Match 3',desc:'A 6x6 grid with icons. Swap adjacent tiles to make rows/columns of 3.'},{title:'Swap',desc:'Pick a tile, then pick an adjacent tile to swap.'},{title:'Score',desc:'Each match earns points. Chain matches for bonus.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('match-grid');
  const ICONS=['🔥','💧','🌿','⭐','💎'];
  let grid=[],selected=null,score=0,level=1,isPlaying=false,moves=0,moveLimit=30;

  function init(){
    grid=[];
    for(let i=0;i<36;i++)grid.push(ICONS[Math.floor(Math.random()*ICONS.length)]);
    while(findMatches().length>0){removeMatches();fillGaps();}
    selected=null;moves=0;moveLimit=30-level;render();
  }
  function render(){
    gridEl.innerHTML='';
    grid.forEach((v,i)=>{
      const cell=document.createElement('div');
      cell.className='match-cell'+(selected===i?' selected':'');
      cell.textContent=v;
      cell.addEventListener('click',()=>onClick(i));
      gridEl.appendChild(cell);
    });
  }
  function onClick(i){
    if(!isPlaying)return;
    if(selected===null){selected=i;render();return;}
    const a=selected,b=i;
    const r1=Math.floor(a/6),c1=a%6,r2=Math.floor(b/6),c2=b%6;
    if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1){selected=i;render();return;}
    [grid[a],grid[b]]=[grid[b],grid[a]];
    const matches=findMatches();
    if(matches.length===0){[grid[a],grid[b]]=[grid[b],grid[a]];selected=null;render();return;}
    selected=null;moves++;
    removeMatches();fillGaps();render();
    score+=matches.length*10;hud.setScore(score);
    if(moves>=moveLimit){level++;hud.setLevel(level);setTimeout(init,400);}
  }
  function findMatches(){
    const matched=new Set();
    for(let r=0;r<6;r++)for(let c=0;c<4;c++){const i=r*6+c;if(grid[i]===grid[i+1]&&grid[i+1]===grid[i+2]){matched.add(i);matched.add(i+1);matched.add(i+2);}}
    for(let c=0;c<6;c++)for(let r=0;r<4;r++){const i=r*6+c;if(grid[i]===grid[i+6]&&grid[i+6]===grid[i+12]){matched.add(i);matched.add(i+6);matched.add(i+12);}}
    return [...matched];
  }
  function removeMatches(){const m=findMatches();m.sort((a,b)=>b-a);m.forEach(i=>grid.splice(i,1));}
  function fillGaps(){while(grid.length<36)grid.splice(0,0,ICONS[Math.floor(Math.random()*ICONS.length)]);}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
