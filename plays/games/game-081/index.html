<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-81.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 081</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-081">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 081</h1>
    <p>Di chuyển chuột để nghiêng mê cung. Đưa bóng xanh đến đích!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-081';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Nghiêng Mê Cung',desc:'Di chuyển chuột sang trái/phải để nghiêng mê cung.'},{title:'Đích',desc:'Đưa bóng xanh đến ô màu vàng.'},{title:'Khó dần',desc:'Mê cung phức tạp hơn ở các màn sau.'}],
    en:[{title:'Tilt Maze',desc:'Move mouse left/right to tilt the maze.'},{title:'Goal',desc:'Guide the blue ball to the yellow cell.'},{title:'Harder',desc:'Mazes get more complex in later levels.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let ball={x:30,y:30,r:8,vx:0,vy:0};
  let walls=[],goal={x:0,y:0,w:30,h:30},tilt=0;

  function init(){
    walls=[];
    const cols=Math.floor(canvas.width/40),rows=Math.floor(canvas.height/40);
    for(let i=0;i<5+level;i++){
      const x=40+Math.floor(Math.random()*(cols-2))*40;
      const y=40+Math.floor(Math.random()*(rows-2))*40;
      walls.push({x,y,w:40,h:8});
    }
    goal={x:canvas.width-40,y:canvas.height-40,w:30,h:30};
    ball={x:20,y:20,r:8,vx:0,vy:0};
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#334155';
    walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));
    ctx.fillStyle='#eab308';ctx.fillRect(goal.x,goal.y,goal.w,goal.h);
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  }
  function update(){
    if(!isPlaying)return;
    ball.vx+=tilt*0.2;ball.vy+=0.1;ball.vx*=0.95;ball.vy*=0.95;
    ball.x+=ball.vx;ball.y+=ball.vy;
    if(ball.x<ball.r){ball.x=ball.r;ball.vx=0;}if(ball.x>canvas.width-ball.r){ball.x=canvas.width-ball.r;ball.vx=0;}
    if(ball.y<ball.r){ball.y=ball.r;ball.vy=0;}if(ball.y>canvas.height-ball.r){ball.y=canvas.height-ball.r;ball.vy=0;}
    walls.forEach(w=>{
      if(ball.x+ball.r>w.x&&ball.x-ball.r<w.x+w.w&&ball.y+ball.r>w.y&&ball.y-ball.r<w.y+w.h){
        ball.vx*=-0.8;ball.vy*=-0.8;ball.x+=ball.vx;ball.y+=ball.vy;
      }
    });
    if(ball.x>goal.x&&ball.x<goal.x+goal.w&&ball.y>goal.y&&ball.y<goal.y+goal.h){
      score+=level*50;hud.setScore(score);level++;hud.setLevel(level);init();
    }
    draw();requestAnimationFrame(update);
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();update();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function getPos(e){const rect=canvas.getBoundingClientRect();return{x:(e.clientX-rect.left)*(canvas.width/rect.width),y:(e.clientY-rect.top)*(canvas.height/rect.height)};}
  canvas.addEventListener('pointermove',e=>{if(!isPlaying)return;const p=getPos(e);tilt=(p.x-canvas.width/2)/canvas.width*2;});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
