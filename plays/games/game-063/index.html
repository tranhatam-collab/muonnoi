<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 063</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-063">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 063</h1>
    <p>Di chuyển né các hình rơi. Để chạm là thua!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-063';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Né Hình',desc:'Các hình rơi từ trên xuống. Di chuyển để né.'},{title:'Di chuyển',desc:'Dùng chuột hoặc chạm để điều khiển nhân vật.'},{title:'Khó dần',desc:'Hình rơi nhanh hơn theo thời gian.'}],
    en:[{title:'Dodge Shapes',desc:'Shapes fall from above. Move to dodge them.'},{title:'Move',desc:'Use mouse or touch to control your character.'},{title:'Harder',desc:'Falling speed increases over time.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:160,y:350,r:10};
  let shapes=[],spawnTimer=null,speed=2;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
    shapes.forEach(s=>{ctx.fillStyle=s.color;ctx.fillRect(s.x,s.y,s.w,s.h);});
  }
  function update(){
    if(!isPlaying)return;
    shapes.forEach(s=>s.y+=speed);
    shapes=shapes.filter(s=>s.y<canvas.height);
    for(const s of shapes){
      if(s.x<player.x+player.r&&s.x+s.w>player.x-player.r&&s.y<player.y+player.r&&s.y+s.h>player.y-player.r){endGame();return;}
    }
    score++;if(score%400===0){level++;hud.setLevel(level);speed+=0.5;}
    hud.setScore(score);draw();requestAnimationFrame(update);
  }
  function spawn(){if(!isPlaying)return;const w=20+Math.random()*30;shapes.push({x:Math.random()*(canvas.width-w),y:-30,w:w,h:w,color:['#ef4444','#eab308','#22c55e','#a855f7'][Math.floor(Math.random()*4)]});}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;player={x:160,y:350,r:10};shapes=[];speed=2;hud.setScore(0);hud.setLevel(1);update();spawnTimer=setInterval(spawn,900);}
  function endGame(){isPlaying=false;clearInterval(spawnTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function movePlayer(cx){const rect=canvas.getBoundingClientRect();player.x=(cx-rect.left)*(canvas.width/rect.width);player.x=Math.max(player.r,Math.min(canvas.width-player.r,player.x));}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)movePlayer(e.clientX);});
  canvas.addEventListener('pointerdown',e=>{if(isPlaying)movePlayer(e.clientX);});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
