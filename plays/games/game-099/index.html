<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-99.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 099</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-099">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 099</h1>
    <p>Nhấn để tung hứng bóng. Giữ bóng không rơi!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-099';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Tung Hứng',desc:'Nhấn khi bóng rơi xuống để đẩy nó lên.'},{title:'Nhiều bóng',desc:'Mỗi màn sẽ có thêm bóng mới xuất hiện.'},{title:'Thua',desc:'Để bóng nào rơi xuống dưới là thua.'}],
    en:[{title:'Juggling',desc:'Tap when a ball falls to push it back up.'},{title:'More Balls',desc:'Each round adds a new ball.'},{title:'Lose',desc:'Let any ball fall below = game over.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let balls=[],gravity=0.3;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    balls.forEach(b=>{ctx.fillStyle='#eab308';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});
    ctx.strokeStyle='#94a3b8';ctx.beginPath();ctx.moveTo(0,380);ctx.lineTo(canvas.width,380);ctx.stroke();
  }
  function update(){
    if(!isPlaying)return;
    balls.forEach(b=>{b.vy+=gravity;b.x+=b.vx;b.y+=b.vy;if(b.x<0||b.x>canvas.width)b.vx*=-1;});
    for(let i=balls.length-1;i>=0;i--){
      if(balls[i].y>canvas.height){endGame();return;}
    }
    draw();requestAnimationFrame(update);
  }
  function addBall(){balls.push({x:40+Math.random()*(canvas.width-80),y:50,vx:(Math.random()-0.5)*2,vy:0,r:8});}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;balls=[];gravity=0.3;addBall();hud.setScore(0);hud.setLevel(1);update();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  canvas.addEventListener('pointerdown',e=>{
    if(!isPlaying)return;
    const rect=canvas.getBoundingClientRect();
    const px=(e.clientX-rect.left)*(canvas.width/rect.width);
    const py=(e.clientY-rect.top)*(canvas.height/rect.height);
    for(let i=balls.length-1;i>=0;i--){
      const b=balls[i];const dx=px-b.x,dy=py-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<30){b.vy=-8;score+=10;hud.setScore(score);}
    }
    if(score>=level*50){level++;hud.setLevel(level);addBall();gravity+=0.05;}
  });
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
