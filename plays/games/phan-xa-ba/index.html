<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Ba cột, ba màu, tốc độ tăng.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phản Xạ Ba — plays.muonnoi.org</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  #triple-board { display: flex; gap: 6px; justify-content: center; margin: 1rem auto; max-width: 380px; touch-action: none; }
  .triple-lane { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .triple-cell { aspect-ratio: 0.85; border-radius: 8px; background: #1f2937; border: 1px solid #374151; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
  .triple-cell:active { transform: scale(0.92); }
  .triple-cell.c0 { background: #ef4444; box-shadow: 0 0 8px #ef444466; }
  .triple-cell.c1 { background: #3b82f6; box-shadow: 0 0 8px #3b82f666; }
  .triple-cell.c2 { background: #10b981; box-shadow: 0 0 8px #10b98166; }
  .triple-cell.wrong { animation: shake 0.3s; background: #6b7280; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  #start-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 50; }
  #start-overlay.hidden { display: none; }
  .start-box { text-align: center; padding: 2rem; background: #111827; border-radius: 12px; border: 1px solid #374151; max-width: 320px; }
  .start-box h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  .start-box p { color: #9ca3af; margin-bottom: 1.5rem; font-size: 0.9rem; }
</style>
</head>
<body data-game="phan-xa-ba">

<div id="hud-root"></div>
<div id="triple-board"></div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Phản Xạ Ba</h1>
    <p>Ba màu, ba cột. Chạm đúng cột với ô đúng màu.</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Nhấn để bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function() {
  'use strict';
  const GAME_ID = 'phan-xa-ba';
  const LANG = document.documentElement.lang === 'en' ? 'en' : 'vi';
  const TUTORIAL_STEPS = {
    vi: [
      { title: 'Phản Xạ Ba', desc: 'Ba cột: ĐỎ (trái), XANH (giữa), XANH LÁ (phải). Ô màu nào thì chạm cột tương ứng.' },
      { title: 'Càng nhanh', desc: 'Ba cột đồng thời xuất hiện. Mỗi ô chỉ tồn tại 1.5 giây. Không được nhầm!' },
      { title: 'Vô hạn', desc: 'Không có giới hạn. Xem bạn được bao nhiều điểm trước khi hết mạng!' },
    ],
    en: [
      { title: 'Triple Reflex', desc: 'Three lanes: RED (left), BLUE (center), GREEN (right). Match each colored cell to its lane.' },
      { title: 'Faster', desc: 'Three columns active simultaneously. Each cell lasts only 1.5s. No mistakes allowed!' },
      { title: 'Endless', desc: 'No limit. See how many points before you run out of lives!' },
    ],
  };
  const ICONS = ['🔴','🔵','🟢'];
  const hud = PlaysSDK.createHud('hud-root', { showLevel: true });
  const board = document.getElementById('triple-board');
  let score = 0, level = 1, lives = 3, isPlaying = false;
  let spawnMs = 800, fadeMs = 1500, spawnTimer = null;
  const active = new Map();

  function build() { board.innerHTML = ''; for (let i = 0; i < 3; i++) { const l = document.createElement('div'); l.className = 'triple-lane'; l.dataset.lane = i; board.appendChild(l); } }
  function spawn() {
    if (!isPlaying) return;
    const c = Math.floor(Math.random() * 3);
    const lane = board.children[c];
    const cell = document.createElement('div');
    cell.className = 'triple-cell c' + c; cell.textContent = ICONS[c]; cell.dataset.color = c;
    lane.insertBefore(cell, lane.firstChild);
    const t = setTimeout(() => { if (!isPlaying) return; cell.classList.add('wrong'); setTimeout(() => cell.remove(), 300); active.delete(cell); lives--; if (lives <= 0) endGame(); }, fadeMs);
    active.set(cell, t);
    while (lane.children.length > 5) lane.lastChild.remove();
  }
  function onTap(e) {
    if (!isPlaying) return;
    const cell = e.target.closest('.triple-cell');
    if (!cell || !active.has(cell)) return;
    clearTimeout(active.get(cell)); active.delete(cell);
    const lane = +cell.parentElement.dataset.lane;
    const color = +cell.dataset.color;
    if (lane !== color) { cell.classList.add('wrong'); lives--; }
    else { score++; if (score % 12 === 0) { level++; spawnMs = Math.max(320, spawnMs * 0.9); fadeMs = Math.max(600, fadeMs * 0.92); hud.setLevel(level); } }
    hud.setScore(score); cell.remove(); if (lives <= 0) endGame();
  }
  function startGame() {
    document.getElementById('start-overlay').classList.add('hidden');
    score = 0; level = 1; lives = 3; spawnMs = 800; fadeMs = 1500;
    active.forEach(t => clearTimeout(t)); active.clear();
    build(); hud.setScore(0); hud.setLevel(1); isPlaying = true;
    spawnTimer = setInterval(spawn, spawnMs);
  }
  function endGame() {
    isPlaying = false; clearInterval(spawnTimer);
    active.forEach(t => clearTimeout(t)); active.clear();
    const prev = PlaysSDK.getGuestScores(GAME_ID);
    const best = Math.max(score, prev.best);
    PlaysSDK.saveGuestScore(GAME_ID, score, level);
    PlaysSDK.showGameOver({ gameId: GAME_ID, score, level, best, isNewBest: score === best && score > 0, token: null,
      onRestart: () => { document.querySelector('.plays-gameover-overlay')?.remove(); startGame(); },
      onBack: () => { location.href = '../../'; },
    });
  }
  board.addEventListener('pointerdown', onTap);
  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-tutorial').addEventListener('click', () => {
    PlaysSDK.buildTutorial({ steps: TUTORIAL_STEPS[LANG] || TUTORIAL_STEPS.vi, onFinish: () => {}, onClose: () => {} }).open();
  });
})();
</script>
</body>
</html>
