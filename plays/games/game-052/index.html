<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 052</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .slide-grid { display:grid; grid-template-columns:repeat(3,80px); grid-template-rows:repeat(3,80px); gap:4px; background:#475569; padding:4px; border-radius:0.375rem; }
  .slide-cell { background:#334155; display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:bold; cursor:pointer; user-select:none; }
  .slide-cell.empty { background:transparent; cursor:default; }
</style>
</head>
<body data-game="game-052">

<div id="hud-root"></div>
<div id="game-root">
  <div class="slide-grid" id="slide-grid"></div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 052</h1>
    <p>Trượt các khối số để xếp theo thứ tự 1-8!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-052';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Trượt Khối',desc:'Các khối số bị xáo trộn. Di chuyển chúng để xếp đúng thứ tự 1 đến 8.'},{title:'Cách di chuyển',desc:'Chạm khối liền kề ô trống để trượt nó vào chỗ trống.'},{title:'Thắng',desc:'Xếp đúng thứ tự để hoàn thành. Càng ít bước càng nhiều điểm.'}],
    en:[{title:'Slide Puzzle',desc:'Number blocks are scrambled. Slide them into order 1 to 8.'},{title:'How to move',desc:'Tap a block adjacent to the empty space to slide it.'},{title:'Win',desc:'Arrange in order to finish. Fewer moves = more points.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('slide-grid');
  let board=[],moves=0,score=0,level=1,isPlaying=false;

  function init(){
    board=[1,2,3,4,5,6,7,8,0];
    for(let i=0;i<20;i++){const empty=board.indexOf(0);const neighbors=[];const r=Math.floor(empty/3),c=empty%3;if(r>0)neighbors.push(empty-3);if(r<2)neighbors.push(empty+3);if(c>0)neighbors.push(empty-1);if(c<2)neighbors.push(empty+1);const pick=neighbors[Math.floor(Math.random()*neighbors.length)];[board[empty],board[pick]]=[board[pick],board[empty]];}
    moves=0;render();
  }
  function render(){
    gridEl.innerHTML='';
    board.forEach((v,i)=>{
      const cell=document.createElement('div');
      cell.className='slide-cell'+(v===0?' empty':'');
      cell.textContent=v||'';
      cell.addEventListener('click',()=>{if(!isPlaying)return;const empty=board.indexOf(0);const r=Math.floor(i/3),c=i%3,er=Math.floor(empty/3),ec=empty%3;if((Math.abs(r-er)+Math.abs(c-ec))===1){[board[i],board[empty]]=[board[empty],board[i]];moves++;render();if(board.every((v,i)=>v===(i+1)%9)){score+=Math.max(100,500-moves);hud.setScore(score);level++;hud.setLevel(level);setTimeout(init,400);}}});
      gridEl.appendChild(cell);
    });
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
