<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-56.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 056</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .card-grid { display:grid; grid-template-columns:repeat(4,60px); grid-template-rows:repeat(4,60px); gap:8px; }
  .card { width:60px; height:60px; background:#334155; border-radius:0.5rem; display:flex; align-items:center; justify-content:center; font-size:1.5rem; cursor:pointer; user-select:none; transition:transform 0.3s; transform-style:preserve-3d; }
  .card.flipped { background:#1e293b; }
  .card.matched { background:#22c55e; cursor:default; }
  .card span { opacity:0; transition:opacity 0.2s; }
  .card.flipped span, .card.matched span { opacity:1; }
</style>
</head>
<body data-game="game-056">

<div id="hud-root"></div>
<div id="game-root">
  <div class="card-grid" id="card-grid"></div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 056</h1>
    <p>Lật các thẻ để tìm cặp giống nhau!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-056';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Tìm Cặp',desc:'Lưới 4x4 gồm 8 cặp thẻ giống nhau.'},{title:'Lật thẻ',desc:'Chạm 2 thẻ để lật. Nếu giống nhau thì giữ nguyên.'},{title:'Ghi nhớ',desc:'Nhớ vị trí các thẻ đã lật để tìm cặp nhanh hơn.'}],
    en:[{title:'Match Pairs',desc:'A 4x4 grid with 8 matching pairs.'},{title:'Flip',desc:'Tap 2 cards to flip. If they match they stay open.'},{title:'Remember',desc:'Remember flipped card positions to find pairs faster.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('card-grid');
  const ICONS=['🍎','🍌','🍇','🍉','🍒','🍓','🍍','🥝'];
  let cards=[],flipped=[],matchedCount=0,moves=0,score=0,level=1,isPlaying=false;

  function init(){
    const pairCount=Math.min(8,4+level);
    const values=[];
    for(let i=0;i<pairCount;i++){values.push(ICONS[i],ICONS[i]);}
    for(let i=values.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[values[i],values[j]]=[values[j],values[i]];}
    cards=values.map((v,i)=>({value:v,flipped:false,matched:false,id:i}));
    flipped=[];matchedCount=0;moves=0;render();
  }
  function render(){
    gridEl.innerHTML='';
    cards.forEach((c,i)=>{
      const cell=document.createElement('div');
      cell.className='card'+(c.flipped||c.matched?' flipped':'')+(c.matched?' matched':'');
      cell.innerHTML='<span>'+(c.flipped||c.matched?c.value:'?')+'</span>';
      cell.addEventListener('click',()=>onClick(i));
      gridEl.appendChild(cell);
    });
  }
  function onClick(i){
    if(!isPlaying||cards[i].flipped||cards[i].matched||flipped.length>=2)return;
    cards[i].flipped=true;flipped.push(i);render();
    if(flipped.length===2){
      moves++;
      if(cards[flipped[0]].value===cards[flipped[1]].value){
        cards[flipped[0]].matched=true;cards[flipped[1]].matched=true;
        matchedCount+=2;flipped=[];
        score+=20;hud.setScore(score);
        if(matchedCount===cards.length){level++;hud.setLevel(level);setTimeout(init,600);}
      }else{
        setTimeout(()=>{cards[flipped[0]].flipped=false;cards[flipped[1]].flipped=false;flipped=[];render();},600);
      }
    }
  }
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;hud.setScore(0);hud.setLevel(1);init();}
  function endGame(){isPlaying=false;PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
