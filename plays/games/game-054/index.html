<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 054</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .ttt-grid { display:grid; grid-template-columns:repeat(3,80px); grid-template-rows:repeat(3,80px); gap:4px; background:#475569; padding:4px; border-radius:0.375rem; margin-bottom:0.75rem; }
  .ttt-cell { background:#334155; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:bold; cursor:pointer; user-select:none; }
  .ttt-cell.x { color:#3b82f6; }
  .ttt-cell.o { color:#ef4444; }
  #status { font-size:0.875rem; color:#94a3b8; }
</style>
</head>
<body data-game="game-054">

<div id="hud-root"></div>
<div id="game-root">
  <div class="ttt-grid" id="ttt-grid"></div>
  <div id="status">Bạn là X</div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 054</h1>
    <p>Caro 3x3 với AI. Xếp 3 liên tiếp để thắng!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-054';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Caro 3x3',desc:'Bạn đánh X, AI đánh O. 3 quân liên tiếp là thắng.'},{title:'Tấn công',desc:'Tạo hàng ngang, dọc hoặc chéo 3 quân X.'},{title:'Phòng thủ',desc:'Ngăn AI tạo 3 quân O liên tiếp.'}],
    en:[{title:'Tic-Tac-Toe',desc:'You play X, AI plays O. 3 in a row wins.'},{title:'Attack',desc:'Make a horizontal, vertical or diagonal line of 3 Xs.'},{title:'Defense',desc:'Block AI from making 3 O in a row.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const gridEl=document.getElementById('ttt-grid');
  const statusEl=document.getElementById('status');
  let board=[],isPlaying=false,playerTurn=true,score=0,level=1;

  function reset(){board=new Array(9).fill('');render();}
  function render(){
    gridEl.innerHTML='';
    for(let i=0;i<9;i++){
      const cell=document.createElement('div');
      cell.className='ttt-cell'+(board[i]==='X'?' x':board[i]==='O'?' o':'');
      cell.textContent=board[i]||'';
      cell.addEventListener('click',()=>onClick(i));
      gridEl.appendChild(cell);
    }
  }
  function checkWin(ch){const wins=[[0,1,2],[3,4,5],[6,7,7],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(const[a,b,c]of wins)if(board[a]===ch&&board[b]===ch&&board[c]===ch)return[a,b,c];return null;}
  function onClick(i){
    if(!isPlaying||!playerTurn||board[i])return;
    board[i]='X';render();
    const xWin=checkWin('X');
    if(xWin){highlight(xWin);endGame(true);return;}
    if(board.every(c=>c)){endGame(null);return;}
    playerTurn=false;statusEl.textContent='AI...';
    setTimeout(aiMove,400);
  }
  function aiMove(){
    if(!isPlaying)return;
    const pick=findBest('O')||findBest('X')||board.map((v,i)=>v?-1:i).filter(i=>i!==-1)[Math.floor(Math.random()*board.filter(v=>!v).length)];
    board[pick]='O';render();
    const oWin=checkWin('O');
    if(oWin){highlight(oWin);endGame(false);return;}
    if(board.every(c=>c)){endGame(null);return;}
    playerTurn=true;statusEl.textContent=LANG==='vi'?'Lượt bạn':'Your turn';
  }
  function findBest(ch){const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(const[a,b,c]of wins){const line=[board[a],board[b],board[c]];const empties=[a,b,c].filter(i=>!board[i]);if(line.filter(v=>v===ch).length===2&&empties.length===1)return empties[0];}return null;}
  function highlight(cells){cells.forEach(i=>gridEl.children[i].style.background='#22c55e33');}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;playerTurn=true;hud.setScore(0);hud.setLevel(1);reset();statusEl.textContent='Bạn là X';}
  function endGame(win){
    isPlaying=false;
    if(win===true){score+=level*50;hud.setScore(score);level++;hud.setLevel(level);}
    statusEl.textContent=win===true?(LANG==='vi'?'Bạn thắng!':'You win!'):win===false?(LANG==='vi'?'AI thắng!':'AI wins!'):(LANG==='vi'?'Hòa!':'Draw!');
    PlaysSDK.saveScore(GAME_ID,score,{level});
    setTimeout(()=>PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{if(win===true){reset();isPlaying=true;playerTurn=true;statusEl.textContent='Bạn là X';}else{location.reload();}}),600);
  }
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
