<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Tro choi da hoan thien — Phiên bản 101 #-83.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game 083</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; height:400px; background:#1e293b; border-radius:0.5rem; position:relative; overflow:hidden; margin-bottom:1rem; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body data-game="game-083">

<div id="hud-root"></div>
<div id="game-root">
  <canvas id="game-canvas" width="320" height="400"></canvas>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Game 083</h1>
    <p>Di chuyển né các thiên thạch trong không gian!</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function(){
  'use strict';
  const GAME_ID='game-083';
  const LANG=document.documentElement.lang==='en'?'en':'vi';
  const TUTORIAL_STEPS={
    vi:[{title:'Né Thiên Thạch',desc:'Các thiên thạch bay từ mọi hướng. Di chuyển để né.'},{title:'Di chuyển',desc:'Dùng chuột hoặc chạm để di chuyển phi thuyền.'},{title:'Khó dần',desc:'Thiên thạch nhiều hơn và nhanh hơn theo thời gian.'}],
    en:[{title:'Dodge Meteors',desc:'Meteors fly from all directions. Move to dodge.'},{title:'Move',desc:'Use mouse or touch to move the spaceship.'},{title:'Harder',desc:'More and faster meteors over time.'}]
  };
  const hud=PlaysSDK.createHud('hud-root',{showLevel:true});
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  let score=0,level=1,isPlaying=false;
  let player={x:160,y:200,r:10};
  let meteors=[],spawnTimer=null,speed=2;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.moveTo(player.x,player.y-12);ctx.lineTo(player.x-8,player.y+8);ctx.lineTo(player.x+8,player.y+8);ctx.fill();
    ctx.fillStyle='#94a3b8';
    meteors.forEach(m=>{ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();});
  }
  function update(){
    if(!isPlaying)return;
    meteors.forEach(m=>{m.x+=Math.cos(m.angle)*speed;m.y+=Math.sin(m.angle)*speed;});
    meteors=meteors.filter(m=>m.x>-50&&m.x<canvas.width+50&&m.y>-50&&m.y<canvas.height+50);
    for(const m of meteors){const dx=player.x-m.x,dy=player.y-m.y;if(Math.sqrt(dx*dx+dy*dy)<m.r+player.r){endGame();return;}}
    score++;if(score%400===0){level++;hud.setLevel(level);speed+=0.5;}
    hud.setScore(score);draw();requestAnimationFrame(update);
  }
  function spawn(){if(!isPlaying)return;const angle=Math.random()*Math.PI*2;meteors.push({x:160+Math.cos(angle)*200,y:200+Math.sin(angle)*200,r:5+Math.random()*10,angle:angle+Math.PI});}
  function startGame(){document.getElementById('start-overlay').style.display='none';score=0;level=1;isPlaying=true;player={x:160,y:200,r:10};meteors=[];speed=2;hud.setScore(0);hud.setLevel(1);update();spawnTimer=setInterval(spawn,1000);}
  function endGame(){isPlaying=false;clearInterval(spawnTimer);PlaysSDK.saveScore(GAME_ID,score,{level});PlaysSDK.showGameOver(GAME_ID,score,{level},()=>{location.reload();});}
  function movePlayer(x,y){const rect=canvas.getBoundingClientRect();player.x=(x-rect.left)*(canvas.width/rect.width);player.y=(y-rect.top)*(canvas.height/rect.height);}
  canvas.addEventListener('pointermove',e=>{if(isPlaying)movePlayer(e.clientX,e.clientY);});
  canvas.addEventListener('pointerdown',e=>{if(isPlaying)movePlayer(e.clientX,e.clientY);});
  document.getElementById('btn-start').addEventListener('click',startGame);
  document.getElementById('btn-tutorial').addEventListener('click',()=>PlaysSDK.showTutorial(GAME_ID,TUTORIAL_STEPS[LANG]));
})();
</script>
</body>
</html>
