<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="description" content="Quan sát dãy màu sáng lên rồi nhấn lại đúng thứ tự.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simon Says</title>
<link rel="stylesheet" href="../../styles/plays.css">
<style>
  body { background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  #game-root { width:320px; min-height:360px; background:#1e293b; border-radius:0.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:1rem; position:relative; overflow:hidden; padding:1rem; }
  .simon-grid { display:grid; grid-template-columns:repeat(2, 120px); grid-template-rows:repeat(2, 120px); gap:0.5rem; }
  .simon-btn { border:none; border-radius:0.5rem; cursor:pointer; opacity:0.7; transition:opacity 0.15s, transform 0.1s; }
  .simon-btn.active { opacity:1; transform:scale(1.05); }
  .simon-btn[data-color="0"] { background:#22c55e; }
  .simon-btn[data-color="1"] { background:#ef4444; }
  .simon-btn[data-color="2"] { background:#eab308; }
  .simon-btn[data-color="3"] { background:#3b82f6; }
  #status { margin-top:0.75rem; font-size:0.875rem; color:#94a3b8; }
</style>
</head>
<body data-game="simon-says">

<div id="hud-root"></div>
<div id="game-root">
  <div class="simon-grid" id="simon-grid">
    <button class="simon-btn" data-color="0"></button>
    <button class="simon-btn" data-color="1"></button>
    <button class="simon-btn" data-color="2"></button>
    <button class="simon-btn" data-color="3"></button>
  </div>
  <div id="status">Nhấn Bắt đầu</div>
</div>

<div id="start-overlay">
  <div class="start-box">
    <h1>Simon Says</h1>
    <p>Quan sát dãy màu sáng lên rồi nhấn lại đúng thứ tự.</p>
    <button class="plays-btn plays-btn-primary" id="btn-start">Nhấn để bắt đầu</button>
    <button class="plays-btn plays-btn-ghost" id="btn-tutorial">Hướng dẫn</button>
  </div>
</div>

<script src="../../plays-sdk.js"></script>
<script>
(function() {
  'use strict';
  const GAME_ID = 'simon-says';
  const LANG = document.documentElement.lang === 'en' ? 'en' : 'vi';
  const TUTORIAL_STEPS = {
    vi: [
      { title: 'Simon Says', desc: '4 ô màu sẽ sáng lên theo một dãy. Hãy quan sát kỹ.' },
      { title: 'Nhấn lại', desc: 'Sau khi dãy kết thúc, nhấn các ô theo đúng thứ tự đã thấy.' },
      { title: 'Khó hơn', desc: 'Mỗi lượt đúng, dãy sẽ dài thêm 1 màu. Sai 1 lần là thua!' },
    ],
    en: [
      { title: 'Simon Says', desc: '4 colored buttons will light up in a sequence. Watch carefully.' },
      { title: 'Repeat', desc: 'After the sequence ends, press the buttons in the exact same order.' },
      { title: 'Harder', desc: 'Each correct round adds 1 more color. One mistake and it\'s game over!' },
    ],
  };
  const hud = PlaysSDK.createHud('hud-root', { showLevel: true });
  const buttons = document.querySelectorAll('.simon-btn');
  const statusEl = document.getElementById('status');

  let sequence = [], playerIdx = 0, score = 0, level = 1, isPlaying = false, inputLocked = true;

  function flashBtn(idx, dur = 400) {
    return new Promise(r => {
      buttons[idx].classList.add('active');
      setTimeout(() => { buttons[idx].classList.remove('active'); setTimeout(r, 100); }, dur);
    });
  }

  async function playSequence() {
    inputLocked = true;
    statusEl.textContent = LANG === 'vi' ? 'Quan sát...' : 'Watch...';
    await new Promise(r => setTimeout(r, 600));
    for (const idx of sequence) {
      await flashBtn(idx, Math.max(200, 500 - level * 20));
    }
    inputLocked = false;
    statusEl.textContent = LANG === 'vi' ? 'Nhấn lại!' : 'Repeat!';
  }

  function nextRound() {
    level = sequence.length + 1;
    hud.setLevel(level);
    score += level * 10;
    hud.setScore(score);
    sequence.push(Math.floor(Math.random() * 4));
    playSequence();
  }

  function startGame() {
    document.getElementById('start-overlay').style.display = 'none';
    score = 0; level = 1; sequence = []; playerIdx = 0; isPlaying = true;
    hud.setScore(0); hud.setLevel(1);
    nextRound();
  }

  function endGame() {
    isPlaying = false; inputLocked = true;
    statusEl.textContent = LANG === 'vi' ? 'Kết thúc!' : 'Game Over!';
    PlaysSDK.saveScore(GAME_ID, score, { level });
    PlaysSDK.showGameOver(GAME_ID, score, { level }, () => { location.reload(); });
  }

  buttons.forEach((btn, i) => {
    btn.addEventListener('click', async () => {
      if (!isPlaying || inputLocked) return;
      await flashBtn(i, 200);
      if (i !== sequence[playerIdx]) { endGame(); return; }
      playerIdx++;
      if (playerIdx >= sequence.length) {
        inputLocked = true;
        playerIdx = 0;
        statusEl.textContent = LANG === 'vi' ? 'Tuyệt!' : 'Great!';
        setTimeout(nextRound, 800);
      }
    });
  });

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-tutorial').addEventListener('click', () => {
    PlaysSDK.showTutorial(GAME_ID, TUTORIAL_STEPS[LANG]);
  });
})();
</script>
</body>
</html>
