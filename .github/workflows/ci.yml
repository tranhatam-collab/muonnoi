name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  api-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm i
      - run: npx tsc -p tsconfig.json --noEmit

  web-static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic file presence checks
        run: |
          test -f apps/web/public/index.html
          test -f apps/web/public/app.html
          test -f apps/web/public/_headers
          test -f apps/web/public/_redirects
          test -f apps/web/public/assets/site.js
          test -f apps/web/public/assets/site.css
          echo "OK"
