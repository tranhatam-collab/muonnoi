<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="muonnoi logo">

  <defs>
    <!-- Soft background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e9e9e9"/>
    </linearGradient>

    <!-- Blue gradient -->
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="300">
      <stop offset="0%" stop-color="#1f3b5b"/>
      <stop offset="100%" stop-color="#2c4d73"/>
    </linearGradient>

    <!-- White gradient -->
    <linearGradient id="whiteGrad" x1="0" y1="0" x2="0" y2="300">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18"
        flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Logo group -->
  <g transform="translate(100,120)" filter="url(#shadow)">

    <!-- Left m -->
    <path d="M0 240 V90
             C0 50 30 20 70 20
             C110 20 140 50 140 90
             V240
             H100
             V100
             C100 75 85 60 70 60
             C55 60 40 75 40 100
             V240
             Z"
          fill="url(#blueGrad)" />

    <!-- Right m -->
    <path d="M140 240 V90
             C140 50 170 20 210 20
             C250 20 280 50 280 90
             V240
             H240
             V100
             C240 75 225 60 210 60
             C195 60 180 75 180 100
             V240
             Z"
          fill="url(#whiteGrad)" />

  </g>

  <!-- Text -->
  <g transform="translate(0,360)" filter="url(#shadow)">
    <text x="256"
          y="0"
          text-anchor="middle"
          font-family="Poppins, Arial, sans-serif"
          font-size="64"
          font-weight="600"
          fill="#ffffff"
          style="letter-spacing:1px;">
      muonnoi
    </text>
  </g>

</svg>
