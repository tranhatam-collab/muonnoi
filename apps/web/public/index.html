<!DOCTYPE html>
<html lang="vi">
<head>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        /* Nền trắng đen hòa trộn */
        background: linear-gradient(135deg, #111 0%, #444 50%, #eee 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .glass-card {
        width: 300px;
        height: 400px;
        /* Hiệu ứng gương 3D */
        background: rgba(255, 255, 255, 0.05); /* Lớp nền kính mờ */
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2); /* Viền sáng */
        backdrop-filter: blur(15px); /* Làm mờ nền sau kính */
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); /* Đổ bóng 3D */
        
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white; /* Chữ trắng trên nền tối */
        padding: 20px;
        transition: 0.5s;
    }

    .glass-card:hover {
        transform: translateY(-10px);
        background: rgba(255, 255, 255, 0.1);
    }

    h2 { margin: 0; font-weight: 300; letter-spacing: 2px; }
    p { font-size: 14px; opacity: 0.8; }
</style>
</head>
<body>
    <div class="glass-card">
        <h2>MIRROR</h2>
        <p>Hiệu ứng gương 3D</p>
    </div>
</body>
</html>
