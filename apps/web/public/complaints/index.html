<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Khiếu nại – Muôn Nơi</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
</head>

<body>

<header class="mn-header">
  <div class="mn-header-inner">
    <div class="mn-logo">
      <span class="mn-logo-mark">MN</span>
    </div>
    <a href="/" class="mn-btn-primary">Trang chủ</a>
  </div>
</header>

<section class="mn-hero">
  <h1>Khiếu nại & Báo cáo</h1>
  <p>Gửi thông tin để hệ thống xử lý</p>
</section>

<section class="mn-preview">
  <div class="mn-preview-inner">

    <form style="display:flex;flex-direction:column;gap:12px">

      <input placeholder="Email" style="padding:12px;border-radius:10px;border:1px solid #333;background:#111;color:#fff"/>

      <textarea placeholder="Nội dung khiếu nại"
        style="padding:12px;border-radius:10px;border:1px solid #333;background:#111;color:#fff;height:120px">
      </textarea>

      <button class="mn-btn-primary">Gửi</button>

    </form>

  </div>
</section>

<footer class="mn-footer">
  <span>© Muôn Nơi</span>
</footer>

</body>
</html>
